function useLS(key, init) {
  var s = useState(function() {
    try { var v=localStorage.getItem(key); return v?JSON.parse(v):init; } catch(ex) { return init; }
  });
  var val = s[0], setValRaw = s[1];
  var set = useCallback(function(v) {
    setValRaw(function(prev) {
      var next = typeof v==='function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); syncToSupabase(key, next); } catch(ex) {}
      return next;
    });
  }, [key]);
  return [val, set];
}

function syncToSupabase(key, data) {
  var maps = {
    'chpt_patients': {t:'patients', r:function(p){return {id:p.id,initials:p.initials||'',first_name:p.firstName||'',last_letters:p.lastLetters||'',chart_num:p.chartNum,case_type:p.caseType,co_pay:p.coPay,referring_provider:p.referringProvider,icd10:p.icd10,custom_dx:p.customDx,goals:p.goals||[],notes:p.notes||''};}},
    'chpt_auths': {t:'auths', r:function(a){return {id:a.id,patient_id:a.patientId,auth_num:a.authNum,insurance:a.insurance,start_date:a.startDate,end_date:a.endDate,visits_approved:Number(a.visitsApproved)||0,visits_used:Number(a.visitsUsed)||0,expiry_reminder:Number(a.expiryReminder)||7};}},
    'chpt_appointments': {t:'appointments', r:function(a){return {id:a.id,patient_id:a.patientId,auth_id:a.authId||null,date:a.date,time:a.time,visit_type:a.visitType,attendance:a.attendance,cpt_codes:a.cptCodes||[],co_pay_collected:a.coPayCollected,notes:a.notes||''};}},

    'chpt_reminders': {t:'reminders', r:function(r){return {id:r.id,category:r.category,text:r.text,due_date:r.dueDate,done:r.done};}},
    'chpt_followups': {t:'follow_ups', r:function(f){return {id:f.id,patient_id:f.patientId,reason:f.reason,date:f.date,resolved:f.resolved,notes:f.notes||''};}},
    'chpt_insurverifs': {t:'insur_verifs', r:function(v){return {id:v.id,patient_id:v.patientId,checklist:v.checklist||{},deductible:v.deductible,copay:v.copay,oop:v.oop,oop_remaining:v.oopRemaining,visits_allowed:v.visitsAllowed,notes:v.notes||'',date:v.date};}},
    'chpt_billernotes': {t:'biller_notes', r:function(n){return {id:n.id,text:n.text,date:n.date,ts:n.ts};}},
  };
  if(key==='chpt_closeddays'){
    if(!Array.isArray(data)||data.length===0) return;
    db.from('closed_days').select('day').then(function(res){
      var exDays=(res.data||[]).map(function(r){return r.day;});
      data.forEach(function(d){if(!exDays.includes(d)) db.from('closed_days').insert({id:uid(),day:d}).then(function(){});});
      exDays.forEach(function(d){if(!data.includes(d)) db.from('closed_days').delete().eq('day',d).then(function(){});});
    });
    return;
  }
  var cfg=maps[key];
  if(!cfg||!Array.isArray(data)||data.length===0) return;
  db.from(cfg.t).upsert(data.map(cfg.r),{onConflict:'id'}).then(function() {
    db.from(cfg.t).select('id').then(function(res) {
      if(res.data) {
        var ids=data.map(function(r){return r.id;});
        res.data.filter(function(r){return !ids.includes(r.id);}).forEach(function(r){
          db.from(cfg.t).delete().eq('id',r.id).then(function(){});
        });
      }
    });
  });
}

function loadFromSupabase() {
  var tables = [
    {n:'patients',k:'chpt_patients',m:function(r){return {id:r.id,initials:r.initials||'',firstName:r.first_name||'',lastLetters:r.last_letters||'',chartNum:r.chart_num,caseType:r.case_type,coPay:r.co_pay,referringProvider:r.referring_provider,icd10:r.icd10,customDx:r.custom_dx,goals:r.goals||[],notes:r.notes||''};}},
    {n:'auths',k:'chpt_auths',m:function(r){return {id:r.id,patientId:r.patient_id,authNum:r.auth_num,insurance:r.insurance,startDate:r.start_date,endDate:r.end_date,visitsApproved:r.visits_approved,visitsUsed:r.visits_used,expiryReminder:r.expiry_reminder};}},
    {n:'appointments',k:'chpt_appointments',m:function(r){return {id:r.id,patientId:r.patient_id,authId:r.auth_id,date:r.date,time:r.time,visitType:r.visit_type,attendance:r.attendance,cptCodes:r.cpt_codes||[],coPayCollected:r.co_pay_collected,notes:r.notes||''};}},

    {n:'reminders',k:'chpt_reminders',m:function(r){return {id:r.id,category:r.category,text:r.text,dueDate:r.due_date,done:r.done};}},

    {n:'insur_verifs',k:'chpt_insurverifs',m:function(r){return {id:r.id,patientId:r.patient_id,checklist:r.checklist||{},deductible:r.deductible,copay:r.copay,oop:r.oop,oopRemaining:r.oop_remaining,visitsAllowed:r.visits_allowed,notes:r.notes||'',date:r.date};}},
    {n:'closed_days',k:'chpt_closeddays',m:function(r){return r.day;}},
    {n:'biller_notes',k:'chpt_billernotes',m:function(r){return {id:r.id,text:r.text,date:r.date,ts:r.ts};}},
  ];
  return Promise.all(tables.map(function(t) {
    return db.from(t.n).select('*').order('created_at',{ascending:true}).then(function(res) {
      if(res.data) localStorage.setItem(t.k, JSON.stringify(res.data.map(t.m)));
    }).catch(function(err) { console.warn('Load error:',t.n,err); });
  }));
}

// ── BILLING REPORT TAB ──
function BillingReportTab(props) {
  var patients=props.patients, auths=props.auths, appointments=props.appointments;
  
  // Default to current week Mon-Fri
  var getWeekDates = function() {
    var d = new Date();
    var day = d.getDay();
    var diff = d.getDate() - day + (day===0?-6:1); // Monday
    var mon = new Date(d.setDate(diff));
    var dates = [];
    for(var i=0;i<5;i++) {
      var dd = new Date(mon);
      dd.setDate(mon.getDate()+i);
      dates.push(dd.toISOString().slice(0,10));
    }
    return dates;
  };

  var sw = useState(getWeekDates()), selectedDates=sw[0], setSelectedDates=sw[1];
  var sp = useState(''), previewHtml=sp[0], setPreviewHtml=sp[1];
  var se = useState(''), emailTo=se[0], setEmailTo=se[1];
  var ss = useState(false), sending=ss[0], setSending=ss[1];
  var sst = useState(''), sendStatus=sst[0], setSendStatus=sst[1];
  var scr = useState(false), customRange=scr[0], setCustomRange=scr[1];
  var ssd = useState(''), startDate=ssd[0], setStartDate=ssd[1];
  var sed = useState(''), endDate=sed[0], setEndDate=sed[1];

  function getPt(id){return patients.find(function(p){return p.id===id;});}  function getAuth(id){return auths.find(function(a){return a.id===id;});}
  function getAuth(id){return auths.find(function(a){return a.id===id;});}
  function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});}
  function ptName(p){return p.firstName?(p.firstName+(p.lastLetters?' '+p.lastLetters+'.':'')):p.initials;}

  var toggleDate = function(d) {
    setSelectedDates(function(prev) {
      return prev.indexOf(d)>=0 ? prev.filter(function(x){return x!==d;}) : prev.concat([d]).sort();
    });
  };

  var applyRange = function() {
    if(!startDate||!endDate) return;
    var dates = [];
    var cur = new Date(startDate+'T12:00:00');
    var end = new Date(endDate+'T12:00:00');
    while(cur<=end) {
      var d = cur.toISOString().slice(0,10);
      var day = cur.getDay();
      if(day>=1&&day<=5) dates.push(d); // Mon-Fri only
      cur.setDate(cur.getDate()+1);
    }
    setSelectedDates(dates);
    setCustomRange(false);
  };

  var selectThisWeek = function() {
    setSelectedDates(getWeekDates());
  };

  var buildReportHtml = function() {
    var sortedDates = selectedDates.slice().sort();
    var allAppts = [];

    var dayGrids = sortedDates.map(function(date) {
      var dayAppts = appointments.filter(function(a){return a.date===date&&a.attendance==='Attended';});
      allAppts = allAppts.concat(dayAppts);
      var allCpts = [];
      dayAppts.forEach(function(a){(a.cptCodes||[]).forEach(function(c){if(allCpts.indexOf(c.code)<0) allCpts.push(c.code);});});
      allCpts.sort();

      var fmtDateLong = new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
      var dayUnits = dayAppts.reduce(function(s,a){return (a.cptCodes||[]).reduce(function(su,c){return su+c.units;},s);},0);

      if(dayAppts.length===0) return '<div style="margin-bottom:32px;page-break-inside:avoid">'+
        '<div style="background:#f8f9f7;border-left:4px solid #d0d8d0;padding:14px 20px;border-radius:0 8px 8px 0;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">'+
          '<span style="font-family:Georgia,serif;font-size:15px;font-weight:600;color:#2a3a2a">'+fmtDateLong+'</span>'+
          '<span style="font-size:12px;color:#888;font-style:italic">No attended appointments</span>'+
        '</div></div>';

      var rows = dayAppts.map(function(a, idx) {
        var pt = getPt(a.patientId);
        var auth = auths ? auths.find(function(au){return au.id===a.authId;}) : null;
        var cptMap = {};
        (a.cptCodes||[]).forEach(function(c){cptMap[c.code]=c.units;});
        var totalUnits = (a.cptCodes||[]).reduce(function(s,c){return s+c.units;},0);
        var cptSummary = (a.cptCodes||[]).map(function(c){return c.code+' x'+Number(c.units).toFixed(2);}).join(', ');
        var rowBg = idx%2===0?'#ffffff':'#f8faf8';
        return '<tr style="background:'+rowBg+'">'+
          '<td style="padding:10px 14px;border-bottom:1px solid #eee;font-weight:600;color:#1a2a1a;font-size:13px">'+(pt?ptName(pt):'—')+'</td>'+
          '<td style="padding:10px 14px;border-bottom:1px solid #eee;font-size:12px;color:#555">'+(pt?pt.chartNum||'—':'—')+'</td>'+
          '<td style="padding:10px 14px;border-bottom:1px solid #eee;font-size:12px;color:#555">'+(pt?pt.caseType||'Standard':'—')+'</td>'+
          '<td style="padding:10px 14px;border-bottom:1px solid #eee;font-size:12px;color:#333">'+a.visitType+'</td>'+
          '<td style="padding:10px 14px;border-bottom:1px solid #eee;font-size:11px;color:#444;font-family:monospace">'+cptSummary+'</td>'+
          '<td style="padding:10px 14px;border-bottom:1px solid #eee;text-align:center;font-weight:700;color:#2a6a2a;font-size:14px">'+totalUnits+'</td>'+
          '<td style="padding:10px 14px;border-bottom:1px solid #eee;font-size:12px;color:#555">'+(auth?auth.authNum||'—':'—')+'</td>'+
        '</tr>';
      }).join('');

      // Totals row
      var totals = '<tr style="background:#f0f5f0;font-weight:700;border-top:2px solid #ccd8cc">'+
        '<td style="padding:10px 14px;font-size:13px;color:#1a2a1a">TOTALS</td>'+
        '<td colspan="4" style="padding:10px 14px;font-size:12px;color:#666">'+dayAppts.length+' patient'+(dayAppts.length!==1?'s':'')+' attended</td>'+
        '<td style="padding:10px 14px;text-align:center;font-size:15px;color:#2a6a2a;font-weight:800">'+dayUnits+'</td>'+
        '<td style="padding:10px 14px"></td>'+
      '</tr>';

          e('div',{onClick:function(){setTEstim(!tEstim);},style:chipStyle(tEstim)},'E-Stim'),
          e('div',{onClick:function(){setTMassage(!tMassage);},style:chipStyle(tMassage)},'Therapeutic Massage'),
          e('div',{onClick:function(){setTUltrasound(!tUltrasound);},style:chipStyle(tUltrasound)},'Ultrasound'),
          e('div',{onClick:function(){setTMyofascial(!tMyofascial);},style:chipStyle(tMyofascial)},'Myofascial Release')
        ),
        e('div',{style:{display:'flex',gap:12,flexWrap:'wrap'}},
          tEstim&&e('div',null,e('label',{style:{fontSize:11,color:T.textMuted,display:'block',marginBottom:4,fontWeight:600}},'E-Stim Duration (min)'),e('input',{type:'number',value:tEstimMin,onChange:function(ev){setTEstimMin(ev.target.value);},style:{width:120,fontSize:13}})),
          tMassage&&e('div',null,e('label',{style:{fontSize:11,color:T.textMuted,display:'block',marginBottom:4,fontWeight:600}},'Massage Duration (min)'),e('input',{type:'number',value:tMassageMin,onChange:function(ev){setTMassageMin(ev.target.value);},style:{width:120,fontSize:13}}))
        )
      )),

      // Objective
      e('div',{style:{background:T.bgCard,border:'1px solid '+T.border,borderRadius:10,padding:16,marginBottom:16}},e('div',null,
        e('div',{style:{fontSize:13,fontWeight:700,color:T.text,marginBottom:8,textTransform:'uppercase',letterSpacing:'0.06em'}},'O — Objective / Clinical Observation'),
        e('textarea',{value:obj,onChange:function(ev){setObj(ev.target.value);},rows:3,style:{width:'100%',fontSize:13,resize:'vertical'}})
      )),

      // Skilled Care Justification
      e('div',{style:{background:T.bgCard,border:'1px solid '+T.border,borderRadius:10,padding:16,marginBottom:16}},
        e('div',{style:{fontSize:13,fontWeight:700,color:T.text,marginBottom:4,textTransform:'uppercase',letterSpacing:'0.06em'}},'Skilled Care Justification'),
        e('div',{style:{fontSize:11,color:T.textMuted,marginBottom:10}},'Why does this patient require skilled PT today? Required for WC, No Fault & Medicare audits.'),
        e('div',{style:{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}},
          ['Requires skilled manual therapy beyond patient/caregiver capability',
           'Requires ongoing assessment and modification of treatment plan',
           'Complexity of condition requires clinical judgment of a licensed PT',
           'Demonstrates measurable functional progress with skilled intervention',
           'Safety concerns require skilled supervision during exercise'
          ].map(function(t){
            var sel=skilled.indexOf(t)>=0;
            return e('div',{key:t,onClick:function(){setSkilled(function(prev){
              return prev.indexOf(t)>=0?prev.split('. ').filter(function(x){return x!==t;}).join('. '):prev+(prev?'. ':'')+t;
            });},style:{padding:'6px 12px',borderRadius:6,cursor:'pointer',fontSize:12,
              fontWeight:sel?600:300,background:sel?T.green+'22':T.bgHover,
              border:'1px solid '+(sel?T.green:T.border),color:sel?T.green:T.textMuted}},
              (sel?'✓ ':'')+t
            );
          })
        ),
        e('textarea',{value:skilled,onChange:function(ev){setSkilled(ev.target.value);},
          placeholder:'e.g. Patient requires skilled PT for complex manual therapy and ongoing assessment. Demonstrates measurable progress with 15 degree improvement in lumbar flexion ROM this visit.',
          rows:3,style:{width:'100%',fontSize:13,resize:'vertical'}})
      ),

      // Therapist
      e('div',{style:{background:T.bgCard,border:'1px solid '+T.border,borderRadius:10,padding:16,marginBottom:16}},e('div',null,
        e('div',{style:{fontSize:13,fontWeight:700,color:T.text,marginBottom:8,textTransform:'uppercase',letterSpacing:'0.06em'}},'Therapist'),
        e('input',{value:therapist,onChange:function(ev){setTherapist(ev.target.value);},style:{width:'100%',fontSize:13}})
      )),

      // Actions
      e('div',{style:{background:T.bgCard,border:'1px solid '+T.border,borderRadius:10,padding:16,marginBottom:16}},e('div',null,
        e('div',{style:{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}},
          e('button',{onClick:saveNote,style:{background:T.blue,color:'#fff',border:'none',borderRadius:6,padding:'10px 20px',fontSize:13,fontWeight:700,cursor:'pointer'}},'Save Note'),
          e('button',{onClick:printNote,style:{background:T.green,color:'#fff',border:'none',borderRadius:6,padding:'10px 20px',fontSize:13,fontWeight:700,cursor:'pointer'}},'Print / PDF'),
          e('button',{onClick:clearForm,style:{background:T.bgHover,color:T.textMuted,border:'1px solid '+T.border,borderRadius:6,padding:'10px 16px',fontSize:13,cursor:'pointer'}},'Clear'),
          e('div',{style:{flex:1,minWidth:220}},
            e('label',{style:{fontSize:11,color:T.textMuted,display:'block',marginBottom:4,fontWeight:600}},'Email To (Doctor / Lawyer / Insurance)'),
            e('div',{style:{display:'flex',gap:8}},
              e('input',{type:'email',value:emailTo,onChange:function(ev){setEmailTo(ev.target.value);},placeholder:'recipient@email.com',style:{flex:1,fontSize:13}}),
              e('button',{onClick:sendEmail,style:{background:T.orange,color:'#fff',border:'none',borderRadius:6,padding:'10px 16px',fontSize:13,fontWeight:600,cursor:'pointer'}},'Send')
            )
          )
        ),
        status&&e('div',{style:{marginTop:10,fontSize:12,color:T.green,fontWeight:600}},status)
      ))
    )
  );
}

// MAIN APP
function App() {
  var sr=useState(''), role=sr[0], setRole=sr[1];

  // Check for existing Supabase Auth session on load
  useEffect(function(){
    db.auth.getSession().then(function(res){
      if(res.data&&res.data.session){
        var user=res.data.session.user;
        var meta=user.user_metadata||{};
        var appMeta=user.app_metadata||{};
        var userEmail=user.email||'';
        // Check role in metadata first, then fall back to email
        var r=meta.role||appMeta.role||(userEmail.indexOf('biller')>=0?'biller':'staff');
        sessionStorage.setItem('chpt_auth',r);
        setRole(r);
      } else {
        sessionStorage.removeItem('chpt_auth');
        setRole('');
      }
    });
    // Listen for auth state changes
    var sub=db.auth.onAuthStateChange(function(event,session){
      if(event==='SIGNED_OUT'||event==='TOKEN_REFRESHED'&&!session){
        sessionStorage.clear();
        setRole('');
      }
    });
    return function(){sub&&sub.data&&sub.data.subscription&&sub.data.subscription.unsubscribe();};
  },[]);
  var loggedIn=role==='staff'||role==='biller';
  var sl=useState(false), loading=sl[0], setLoading=sl[1];
  var st=useState('dashboard'), tab=st[0], setTab=st[1];
  var sp=useLS('chpt_patients',[]), patients=sp[0], setPatients=sp[1];
  var sa=useLS('chpt_auths',[]), auths=sa[0], setAuths=sa[1];
  var sap=useLS('chpt_appointments',[]), appointments=sap[0], setAppointments=sap[1];
  var srem=useLS('chpt_reminders',[]), reminders=srem[0], setReminders=srem[1];
  var siv=useLS('chpt_insurverifs',[]), insurVerifs=siv[0], setInsurVerifs=siv[1];

  function handleLogin(r){
    setLoading(true);
    sessionStorage.setItem('chpt_auth', r);
    loadFromSupabase().then(function(){
      // Re-read from localStorage after Supabase load
      try {
        var pts=localStorage.getItem('chpt_patients'); if(pts) setPatients(JSON.parse(pts));
        var apts=localStorage.getItem('chpt_appointments'); if(apts) setAppointments(JSON.parse(apts));
        var aus=localStorage.getItem('chpt_auths'); if(aus) setAuths(JSON.parse(aus));
        var rems=localStorage.getItem('chpt_reminders'); if(rems) setReminders(JSON.parse(rems));
      } catch(ex) {}
      setLoading(false);
      setRole(r);
    }).catch(function(){
      setLoading(false);
      setRole(r);
    });
  }

  var alertCount=useMemo(function(){
    var exp=auths.filter(function(a){return a.endDate&&daysBetween(today(),a.endDate)>=0&&daysBetween(today(),a.endDate)<=7;}).length;
    var low=auths.filter(function(a){return (Number(a.visitsApproved)||0)-(Number(a.visitsUsed)||0)<=2;}).length;
    return exp+low;
  },[auths]);

  if(!loggedIn) return e(LoginScreen,{onLogin:handleLogin});
  if(loading) return e(LoadingScreen,null);
  if(role==='biller') return e(BillerView,{patients:patients,auths:auths,appointments:appointments,setPatients:setPatients,setAuths:setAuths,setAppointments:setAppointments});

  return e('div',{style:{background:T.bg,minHeight:'100vh',color:T.text,fontFamily:"'DM Sans',sans-serif"}},
    e('div',{style:{display:'flex',height:'100vh',overflow:'hidden'}},
      e('div',{style:{width:220,background:T.bgCard,borderRight:'1px solid '+T.border,display:'flex',flexDirection:'column',flexShrink:0,overflowY:'auto'}},
        e('div',{style:{padding:'18px 16px 12px',borderBottom:'1px solid '+T.border,fontSize:13,fontWeight:700,color:T.blue,letterSpacing:'0.02em',lineHeight:1.3}},
          'CHPT',e('br'),e('span',{style:{fontSize:10,fontWeight:400,color:T.textMuted}},'WORKFLOW / TRACKER')
        ),
        e('nav',{style:{padding:'8px 0',flex:1}},
          TABS.map(function(t){
            return e('div',{key:t.id,onClick:function(){setTab(t.id);},style:{display:'flex',alignItems:'center',gap:8,padding:'9px 16px',cursor:'pointer',fontSize:13,fontWeight:500,color:tab===t.id?T.blue:T.textMuted,background:tab===t.id?T.blue+'18':'transparent',borderLeft:'3px solid '+(tab===t.id?T.blue:'transparent')}},
              e('span',null,TAB_ICONS[t.icon]||''),
              e('span',null,t.label),
              t.id==='dashboard'&&alertCount>0&&e('span',{style:{marginLeft:'auto',background:T.red,color:'#fff',borderRadius:99,fontSize:10,fontWeight:700,padding:'1px 6px'}},alertCount)
            );
          })
        ),
        e('div',{style:{padding:'12px 16px',borderTop:'1px solid '+T.border,fontSize:10,color:T.textDim,lineHeight:1.6}},
          'v2.0 - Cloud Sync',e('br'),
          e('span',{onClick:function(){db.auth.signOut().then(function(){sessionStorage.clear();window.location.replace(window.location.pathname);}).catch(function(){sessionStorage.clear();window.location.replace(window.location.pathname);});},style:{color:T.red,cursor:'pointer',fontSize:11}},'Sign Out')
        )
      ),
      e('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
        e('div',{style:{padding:'14px 24px',borderBottom:'1px solid '+T.border,background:T.bgCard,display:'flex',alignItems:'center',justifyContent:'space-between'}},
          e('span',{style:{fontSize:15,fontWeight:700}},(TABS.find(function(t){return t.id===tab;})||{}).label||''),
          e('div',{style:{fontSize:12,color:T.textMuted}},patients.length+' patients - '+auths.length+' auths - '+appointments.filter(function(a){return a.date===today();}).length+' appts today')
        ),
        e('div',{style:{flex:1,overflowY:'auto',padding:'20px 24px'}},
          tab==='dashboard'?e(DashboardTab,{patients:patients,auths:auths,appointments:appointments,reminders:reminders}):
          tab==='patients'?e(PatientsTab,{patients:patients,setPatients:setPatients}):
          tab==='auths'?e(AuthsTab,{patients:patients,auths:auths,setAuths:setAuths}):
          tab==='appointments'?e(AppointmentsTab,{patients:patients,auths:auths,setAuths:setAuths,appointments:appointments,setAppointments:setAppointments}):
          tab==='soap'?e(SOAPTab,{patients:patients}):
          tab==='reminders'?e(RemindersTab,{reminders:reminders,setReminders:setReminders}):

          tab==='insur'?e(InsuranceVerifTab,{patients:patients,insurVerifs:insurVerifs,setInsurVerifs:setInsurVerifs}):
          tab==='reports'?e(ReportsTab,{patients:patients,auths:auths,appointments:appointments}):
          tab==='summary'?e(SummaryTab,{patients:patients,appointments:appointments}):
          tab==='billernotes'?e(BillerNotesTab,null):
          tab==='casechecklist'?e(CaseChecklistTab,{patients:patients}):
          tab==='billingref'?e(BillingRefTab,null):
          tab==='billingreport'?e(BillingReportTab,{patients:patients,auths:auths,appointments:appointments}):
          tab==='dailynotes'?e(DailyNotesTab,{patients:patients,appointments:appointments,auths:auths}):null        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
</script>
</body>
</html>
