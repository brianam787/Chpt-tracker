function useLS(key, init) {
  var s = useState(function() {
    try { var v=localStorage.getItem(key); return v?JSON.parse(v):init; } catch(ex) { return init; }
  });
  var val = s[0], setValRaw = s[1];
  var set = useCallback(function(v) {
    setValRaw(function(prev) {
      var next = typeof v==='function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); syncToSupabase(key, next); } catch(ex) {}
      return next;
    });
  }, [key]);
  return [val, set];
}

function syncToSupabase(key, data) {
  var maps = {
    'chpt_patients': {t:'patients', r:function(p){return {id:p.id,initials:p.initials||'',first_name:p.firstName||'',last_letters:p.lastLetters||'',chart_num:p.chartNum,case_type:p.caseType,co_pay:p.coPay,referring_provider:p.referringProvider,icd10:p.icd10,custom_dx:p.customDx,goals:p.goals||[],notes:p.notes||''};}},
    'chpt_auths': {t:'auths', r:function(a){return {id:a.id,patient_id:a.patientId,auth_num:a.authNum,insurance:a.insurance,start_date:a.startDate,end_date:a.endDate,visits_approved:Number(a.visitsApproved)||0,visits_used:Number(a.visitsUsed)||0,expiry_reminder:Number(a.expiryReminder)||7};}},
    'chpt_appointments': {t:'appointments', r:function(a){return {id:a.id,patient_id:a.patientId,auth_id:a.authId||null,date:a.date,time:a.time,visit_type:a.visitType,attendance:a.attendance,cpt_codes:a.cptCodes||[],co_pay_collected:a.coPayCollected,notes:a.notes||''};}},

    'chpt_reminders': {t:'reminders', r:function(r){return {id:r.id,category:r.category,text:r.text,due_date:r.dueDate,done:r.done};}},
    'chpt_followups': {t:'follow_ups', r:function(f){return {id:f.id,patient_id:f.patientId,reason:f.reason,date:f.date,resolved:f.resolved,notes:f.notes||''};}},
    'chpt_insurverifs': {t:'insur_verifs', r:function(v){return {id:v.id,patient_id:v.patientId,checklist:v.checklist||{},deductible:v.deductible,copay:v.copay,oop:v.oop,oop_remaining:v.oopRemaining,visits_allowed:v.visitsAllowed,notes:v.notes||'',date:v.date};}},
    'chpt_billernotes': {t:'biller_notes', r:function(n){return {id:n.id,text:n.text,date:n.date,ts:n.ts};}},
  };
  if(key==='chpt_closeddays'){
    if(!Array.isArray(data)||data.length===0) return;
    db.from('closed_days').select('day').then(function(res){
      var exDays=(res.data||[]).map(function(r){return r.day;});
      data.forEach(function(d){if(!exDays.includes(d)) db.from('closed_days').insert({id:uid(),day:d}).then(function(){});});
      exDays.forEach(function(d){if(!data.includes(d)) db.from('closed_days').delete().eq('day',d).then(function(){});});
    });
    return;
  }
  var cfg=maps[key];
  if(!cfg||!Array.isArray(data)||data.length===0) return;
  db.from(cfg.t).upsert(data.map(cfg.r),{onConflict:'id'}).then(function() {
    db.from(cfg.t).select('id').then(function(res) {
      if(res.data) {
        var ids=data.map(function(r){return r.id;});
        res.data.filter(function(r){return !ids.includes(r.id);}).forEach(function(r){
          db.from(cfg.t).delete().eq('id',r.id).then(function(){});
        });
      }
    });
  });
}

function loadFromSupabase() {
  var tables = [
    {n:'patients',k:'chpt_patients',m:function(r){return {id:r.id,initials:r.initials||'',firstName:r.first_name||'',lastLetters:r.last_letters||'',chartNum:r.chart_num,caseType:r.case_type,coPay:r.co_pay,referringProvider:r.referring_provider,icd10:r.icd10,customDx:r.custom_dx,goals:r.goals||[],notes:r.notes||''};}},
    {n:'auths',k:'chpt_auths',m:function(r){return {id:r.id,patientId:r.patient_id,authNum:r.auth_num,insurance:r.insurance,startDate:r.start_date,endDate:r.end_date,visitsApproved:r.visits_approved,visitsUsed:r.visits_used,expiryReminder:r.expiry_reminder};}},
    {n:'appointments',k:'chpt_appointments',m:function(r){return {id:r.id,patientId:r.patient_id,authId:r.auth_id,date:r.date,time:r.time,visitType:r.visit_type,attendance:r.attendance,cptCodes:r.cpt_codes||[],coPayCollected:r.co_pay_collected,notes:r.notes||''};}},

    {n:'reminders',k:'chpt_reminders',m:function(r){return {id:r.id,category:r.category,text:r.text,dueDate:r.due_date,done:r.done};}},

    {n:'insur_verifs',k:'chpt_insurverifs',m:function(r){return {id:r.id,patientId:r.patient_id,checklist:r.checklist||{},deductible:r.deductible,copay:r.copay,oop:r.oop,oopRemaining:r.oop_remaining,visitsAllowed:r.visits_allowed,notes:r.notes||'',date:r.date};}},
    {n:'closed_days',k:'chpt_closeddays',m:function(r){return r.day;}},
    {n:'biller_notes',k:'chpt_billernotes',m:function(r){return {id:r.id,text:r.text,date:r.date,ts:r.ts};}},
  ];
  return Promise.all(tables.map(function(t) {
    return db.from(t.n).select('*').order('created_at',{ascending:true}).then(function(res) {
      if(res.data) localStorage.setItem(t.k, JSON.stringify(res.data.map(t.m)));
    }).catch(function(err) { console.warn('Load error:',t.n,err); });
  }));
}

function LoginScreen(props) {
  var s1=useState(''), pw=s1[0], setPw=s1[1];
  var s2=useState(''), err=s2[0], setErr=s2[1];
  var s3=useState(false), loading=s3[0], setLoading=s3[1];
  function login() {
    setLoading(true); setErr('');
    if(pw===BILLER_PW){sessionStorage.setItem('chpt_auth','biller');sessionStorage.removeItem('chpt_biller_loaded');props.onLogin('biller');setLoading(false);return;}
    db.from('app_settings').select('password').eq('id','settings').single().then(function(res){
      if(res.data&&res.data.password===pw){sessionStorage.setItem('chpt_auth','staff');props.onLogin('staff');}

  var ss=useState(false), show=ss[0], setShow=ss[1];
  var sd=useState(null), confirmDel=sd[0], setConfirmDel=sd[1];
  var svm=useState('week'), viewMode=svm[0], setViewMode=svm[1];
  var sfd=useState(''), filterDate=sfd[0], setFilterDate=sfd[1];

  var srw=useState(4), recurWeeks=srw[0], setRecurWeeks=srw[1];
  var sws=useState(function(){var d=new Date();d.setDate(d.getDate()-d.getDay()+1);var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}), weekStart=sws[0], setWeekStart=sws[1];
  var sgd=useState(today()), gridDate=sgd[0], setGridDate=sgd[1];

  var weekDays=Array.from({length:6},function(_,i){return addDays(weekStart,i);});

  function attColor(s){return s==='Attended'?T.green:s==='No-Show'?T.red:s==='Cancelled'?T.orange:s==='Closed'?T.textDim:T.blue;}
  function getPt(id){return patients.find(function(p){return p.id===id;});}
  function getAuth(id){return auths.find(function(a){return a.id===id;});}

  function toggleClosed(day){setClosedDays(function(d){return d.indexOf(day)>=0?d.filter(function(x){return x!==day;}):d.concat([day]);});}

  function markAttended(appt){
    if(appt.attendance==='Attended') return;

    if(appt.authId) setAuths(function(a){return a.map(function(x){return x.id===appt.authId?Object.assign({},x,{visitsUsed:(Number(x.visitsUsed)||0)+1}):x;});});
  }

    else{setConfirmDel(id);setTimeout(function(){setConfirmDel(null);},3000);}
  }

  function save(){
    if(!form.patientId||!form.date) return alert('Patient and date required.');

    if(editing){
      setAppointments(function(a){return a.map(function(x){return x.id===editing?Object.assign({},form,{id:editing}):x;});});
      if(!wasAttended&&isNow&&form.authId) setAuths(function(a){return a.map(function(x){return x.id===form.authId?Object.assign({},x,{visitsUsed:(Number(x.visitsUsed)||0)+1}):x;});});
      else if(wasAttended&&!isNow&&form.authId) setAuths(function(a){return a.map(function(x){return x.id===form.authId?Object.assign({},x,{visitsUsed:Math.max(0,(Number(x.visitsUsed)||0)-1)}):x;});});

            e('tr',{style:{background:T.bg,borderBottom:'1px solid '+T.border}},e('td',{style:Object.assign({},tdBase,{fontWeight:700})},'Neuro (Stroke/PD)'),e('td',{style:Object.assign({},tdBase,{color:T.textMuted,fontFamily:'monospace',fontSize:11})},'97112x3 + 97116x2 + 97530x1 + 97535x1'),e('td',{style:tdBase},'7 units'),e('td',{style:Object.assign({},tdBase,{color:T.green,fontWeight:700})},'$230-$380')),
            e('tr',{style:{background:T.blue+'10'}},e('td',{style:Object.assign({},tdBase,{fontWeight:700,color:T.blue})},'Standard Default ★'),e('td',{style:Object.assign({},tdBase,{color:T.textMuted,fontFamily:'monospace',fontSize:11})},'97140x2 + 97110x2 + 97530x1 + 97535x1 + 97010'),e('td',{style:tdBase},'6u+flat'),e('td',{style:Object.assign({},tdBase,{color:T.green,fontWeight:700})},'$200-$320'))
          )
        )
      )
    ),

    e('div',{style:cardStyle},
      e('div',{style:{fontWeight:700,color:T.blue,marginBottom:12,fontSize:13,textTransform:'uppercase',letterSpacing:'0.04em'}},'End-of-Visit Documentation Checklist'),
      e('div',{style:{background:T.red+'15',border:'1px solid '+T.red,borderRadius:6,padding:'10px',marginBottom:14,fontSize:12,color:T.red}},
        'CRITICAL: If it is not documented it cannot be billed. Take 3 extra minutes per note!'
      ),
      ['Start AND stop time for each timed code (e.g. "97140 - 9:05 to 9:27am, 22 min")',
       'Specific techniques used for each code (e.g. "joint mob grade III to L4-L5, STM to paraspinals")',
       'Patient response to each intervention (e.g. "pain reduced from 6/10 to 3/10 after manual therapy")',
       'Functional goal tied to each treatment (e.g. "to improve sit-to-stand for home independence")',
       'Medical necessity clearly stated - why this patient needs this treatment today',
       'Home exercise program taught - triggers 97535 (minimum 8 minutes of instruction)',
       'Functional activities performed - triggers 97530 (sit-to-stand, gait, ADLs)',
      ].map(function(item,i){
        return e('div',{key:i,style:{display:'flex',alignItems:'flex-start',gap:12,padding:'10px 0',borderBottom:'1px solid '+T.border}},
          e('div',{style:{width:20,height:20,border:'2px solid '+T.border,borderRadius:4,flexShrink:0,marginTop:2}}),
          e('span',{style:{fontSize:13,color:T.text,lineHeight:1.6}},item)
        );
      })
    ),

    e('div',{style:{fontSize:11,color:T.textDim,textAlign:'center',padding:'8px',fontStyle:'italic'}},
      'Only bill for services actually performed and documented.'
    )
  );
}

// MAIN APP
function App() {
  var sr=useState(function(){return sessionStorage.getItem('chpt_auth')||'';}), role=sr[0], setRole=sr[1];
  var loggedIn=role==='staff'||role==='biller';
  var sl=useState(false), loading=sl[0], setLoading=sl[1];
  var st=useState('dashboard'), tab=st[0], setTab=st[1];
  var sp=useLS('chpt_patients',[]), patients=sp[0], setPatients=sp[1];
  var sa=useLS('chpt_auths',[]), auths=sa[0], setAuths=sa[1];
  var sap=useLS('chpt_appointments',[]), appointments=sap[0], setAppointments=sap[1];
  var srem=useLS('chpt_reminders',[]), reminders=srem[0], setReminders=srem[1];
  var siv=useLS('chpt_insurverifs',[]), insurVerifs=siv[0], setInsurVerifs=siv[1];

  function handleLogin(r){
    setLoading(true);
    loadFromSupabase().then(function(){
      setLoading(false);
      sessionStorage.setItem('chpt_auth', r);
      setRole(r);
      window.location.reload();
    }).catch(function(){
      setLoading(false);
      sessionStorage.setItem('chpt_auth', r);
      setRole(r);
      window.location.reload();
    });
  }

  var alertCount=useMemo(function(){
    var exp=auths.filter(function(a){return a.endDate&&daysBetween(today(),a.endDate)>=0&&daysBetween(today(),a.endDate)<=7;}).length;
    var low=auths.filter(function(a){return (Number(a.visitsApproved)||0)-(Number(a.visitsUsed)||0)<=2;}).length;
    return exp+low;
  },[auths]);

  if(!loggedIn) return e(LoginScreen,{onLogin:handleLogin});
  if(loading) return e(LoadingScreen,null);
  // For biller - load fresh from Supabase on login (only once per session)
  useEffect(function(){
    if(role==='biller' && !sessionStorage.getItem('chpt_biller_loaded')){
      sessionStorage.setItem('chpt_biller_loaded','1');
      loadFromSupabase().then(function(){
        window.location.reload();
      });
    }
  },[role]);

  if(role==='biller') return e(BillerView,{patients:patients,auths:auths,appointments:appointments});

  return e('div',{style:{background:T.bg,minHeight:'100vh',color:T.text,fontFamily:"'DM Sans',sans-serif"}},
    e('div',{style:{display:'flex',height:'100vh',overflow:'hidden'}},
      e('div',{style:{width:220,background:T.bgCard,borderRight:'1px solid '+T.border,display:'flex',flexDirection:'column',flexShrink:0,overflowY:'auto'}},
        e('div',{style:{padding:'18px 16px 12px',borderBottom:'1px solid '+T.border,fontSize:13,fontWeight:700,color:T.blue,letterSpacing:'0.02em',lineHeight:1.3}},
          'CHPT',e('br'),e('span',{style:{fontSize:10,fontWeight:400,color:T.textMuted}},'WORKFLOW / TRACKER')
        ),
        e('nav',{style:{padding:'8px 0',flex:1}},
          TABS.map(function(t){
            return e('div',{key:t.id,onClick:function(){setTab(t.id);},style:{display:'flex',alignItems:'center',gap:8,padding:'9px 16px',cursor:'pointer',fontSize:13,fontWeight:500,color:tab===t.id?T.blue:T.textMuted,background:tab===t.id?T.blue+'18':'transparent',borderLeft:'3px solid '+(tab===t.id?T.blue:'transparent')}},
              e('span',null,TAB_ICONS[t.icon]||''),
              e('span',null,t.label),
              t.id==='dashboard'&&alertCount>0&&e('span',{style:{marginLeft:'auto',background:T.red,color:'#fff',borderRadius:99,fontSize:10,fontWeight:700,padding:'1px 6px'}},alertCount)
            );
          })
        ),
        e('div',{style:{padding:'12px 16px',borderTop:'1px solid '+T.border,fontSize:10,color:T.textDim,lineHeight:1.6}},
          'v2.0 - Cloud Sync',e('br'),
          e('span',{onClick:function(){sessionStorage.removeItem('chpt_auth');window.location.reload();},style:{color:T.red,cursor:'pointer',fontSize:11}},'Sign Out')
        )
      ),
      e('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
        e('div',{style:{padding:'14px 24px',borderBottom:'1px solid '+T.border,background:T.bgCard,display:'flex',alignItems:'center',justifyContent:'space-between'}},
          e('span',{style:{fontSize:15,fontWeight:700}},(TABS.find(function(t){return t.id===tab;})||{}).label||''),
          e('div',{style:{fontSize:12,color:T.textMuted}},patients.length+' patients - '+auths.length+' auths - '+appointments.filter(function(a){return a.date===today();}).length+' appts today')
        ),
        e('div',{style:{flex:1,overflowY:'auto',padding:'20px 24px'}},
          tab==='dashboard'?e(DashboardTab,{patients:patients,auths:auths,appointments:appointments,reminders:reminders}):
          tab==='patients'?e(PatientsTab,{patients:patients,setPatients:setPatients}):
          tab==='auths'?e(AuthsTab,{patients:patients,auths:auths,setAuths:setAuths}):
          tab==='appointments'?e(AppointmentsTab,{patients:patients,auths:auths,setAuths:setAuths,appointments:appointments,setAppointments:setAppointments}):
          tab==='soap'?e(SOAPTab,{patients:patients}):
          tab==='reminders'?e(RemindersTab,{reminders:reminders,setReminders:setReminders}):

          tab==='insur'?e(InsuranceVerifTab,{patients:patients,insurVerifs:insurVerifs,setInsurVerifs:setInsurVerifs}):
          tab==='reports'?e(ReportsTab,{patients:patients,auths:auths,appointments:appointments}):
          tab==='summary'?e(SummaryTab,{patients:patients,appointments:appointments}):
          tab==='billernotes'?e(BillerNotesTab,null):
          tab==='casechecklist'?e(CaseChecklistTab,{patients:patients}):
          tab==='billingref'?e(BillingRefTab,null):null        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
</script>
</body>
