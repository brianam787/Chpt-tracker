const ALERT_EMAILS = ['caringhandpt@aol.com', 'manisie@aol.com'];

async function sendAuthAlerts(auths, patients) {
  try {
    const todayStr = today();
    const alerts = [];
    
    auths.forEach(a => {
      const pt = patients.find(p => p.id === a.patientId);
      const ptName = pt ? pt.initials + (pt.shortId ? ' ['+pt.shortId+']' : '') + ' #' + pt.chartNum : 'Unknown';
      const remaining = (Number(a.visitsApproved)||0) - (Number(a.visitsUsed)||0);
      
      if (a.endDate) {
        const days = daysBetween(todayStr, a.endDate);
        if (days >= 0 && days <= (Number(a.expiryReminder)||7)) {
          alerts.push('⏰ Auth ' + a.authNum + ' for ' + ptName + ' expires in ' + days + ' day(s) on ' + fmt(a.endDate));
        }
        if (days < 0) {
          alerts.push('❌ Auth ' + a.authNum + ' for ' + ptName + ' EXPIRED ' + Math.abs(days) + ' day(s) ago');
        }
      }
      if (remaining <= 2 && Number(a.visitsApproved) > 0) {
        alerts.push('⚠ Auth ' + a.authNum + ' for ' + ptName + ' has only ' + remaining + ' visit(s) remaining');
      }
    });

    if (alerts.length === 0) return { sent: false, reason: 'No alerts today' };

    const message = 'CHPT Auth Alert - ' + new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'}) + '\n\n' + alerts.join('\n') + '\n\nLog in at chpt-tracker.vercel.app to take action.';

    // Use EmailJS to send
    await emailjs.send('service_ir7701s', '3ffo17c', {
      to_email: ALERT_EMAILS.join(','),
      message: message,
      date: new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'}),
      alert_count: alerts.length,
      alerts_list: alerts.join('\n'),
    }, 'hNSkztYjo3NFDCznz');

    return { sent: true, count: alerts.length };
  } catch(err) {
    console.warn('Email alert error:', err);
    return { sent: false, error: err.message };
  }
}

// Check and send alerts on login (once per day)
async function checkAndSendAlerts(auths, patients) {
  const lastSent = localStorage.getItem('chpt_last_alert');
  const todayStr = today();
  if (lastSent === todayStr) return; // Already sent today
  const result = await sendAuthAlerts(auths, patients);
  if (result.sent) {
    localStorage.setItem('chpt_last_alert', todayStr);
  }
}

// localStorage hook
function useLS(key, init) {
  const [val, setVal] = useState(() => {
    try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch { return init; }
  });
  const set = useCallback(v => {
    setVal(prev => {
      const next = typeof v==='function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); syncToSupabase(key, next); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
}

// Supabase sync
async function syncToSupabase(key, data) {
  try {
    const maps = {
      'chpt_patients': {t:'patients', r:p=>({id:p.id,initials:p.initials,first_name:p.firstName||'',last_letters:p.lastLetters||'',short_id:p.shortId||'',chart_num:p.chartNum,case_type:p.caseType,co_pay:p.coPay,referring_provider:p.referringProvider,icd10:p.icd10,custom_dx:p.customDx,goals:p.goals||[],notes:p.notes||''})},
      'chpt_auths': {t:'auths', r:a=>({id:a.id,patient_id:a.patientId,auth_num:a.authNum,insurance:a.insurance,start_date:a.startDate,end_date:a.endDate,visits_approved:Number(a.visitsApproved)||0,visits_used:Number(a.visitsUsed)||0,expiry_reminder:Number(a.expiryReminder)||7})},
      'chpt_appointments': {t:'appointments', r:a=>({id:a.id,patient_id:a.patientId,auth_id:a.authId||null,date:a.date,time:a.time,visit_type:a.visitType,attendance:a.attendance,cpt_codes:a.cptCodes||[],co_pay_collected:a.coPayCollected,notes:a.notes||''})},
      'chpt_pocs': {t:'pocs', r:p=>({id:p.id,patient_id:p.patientId,eval_date:p.evalDate,cert_end:p.certEnd,discharge_goal:p.dischargeGoal,status:p.status,notes:p.notes||''})},
      'chpt_reminders': {t:'reminders', r:r=>({id:r.id,category:r.category,text:r.text,due_date:r.dueDate,done:r.done})},
      'chpt_followups': {t:'follow_ups', r:f=>({id:f.id,patient_id:f.patientId,reason:f.reason,date:f.date,resolved:f.resolved,notes:f.notes||''})},
      'chpt_insurverifs': {t:'insur_verifs', r:v=>({id:v.id,patient_id:v.patientId,checklist:v.checklist||{},deductible:v.deductible,copay:v.copay,oop:v.oop,oop_remaining:v.oopRemaining,visits_allowed:v.visitsAllowed,notes:v.notes||'',date:v.date})},
      'chpt_billernotes': {t:'biller_notes', r:n=>({id:n.id,text:n.text,date:n.date,ts:n.ts})},
    };
    if (key==='chpt_closeddays') {
      const days=Array.isArray(data)?data:[];
      const {data:ex}=await db.from('closed_days').select('day');
      const exDays=(ex||[]).map(r=>r.day);
      for(const d of days) if(!exDays.includes(d)) await db.from('closed_days').insert({id:uid(),day:d});
      for(const d of exDays) if(!days.includes(d)) await db.from('closed_days').delete().eq('day',d);
      return;
    }
    const cfg=maps[key];
    if(!cfg||!Array.isArray(data)) return;
    if(data.length>0) await db.from(cfg.t).upsert(data.map(cfg.r),{onConflict:'id'});
    const {data:ex}=await db.from(cfg.t).select('id');
    if(ex) {
      const ids=data.map(r=>r.id);
      for(const r of ex.filter(r=>!ids.includes(r.id))) await db.from(cfg.t).delete().eq('id',r.id);
    }
  } catch(err) { console.warn('Sync error:',err); }
}

async function loadFromSupabase() {
  const tables = [
    {n:'patients',k:'chpt_patients',m:r=>({id:r.id,initials:r.initials,firstName:r.first_name||'',lastLetters:r.last_letters||'',shortId:r.short_id||'',chartNum:r.chart_num,caseType:r.case_type,coPay:r.co_pay,referringProvider:r.referring_provider,icd10:r.icd10,customDx:r.custom_dx,goals:r.goals||[],notes:r.notes||''})},
    {n:'auths',k:'chpt_auths',m:r=>({id:r.id,patientId:r.patient_id,authNum:r.auth_num,insurance:r.insurance,startDate:r.start_date,endDate:r.end_date,visitsApproved:r.visits_approved,visitsUsed:r.visits_used,expiryReminder:r.expiry_reminder})},
    {n:'appointments',k:'chpt_appointments',m:r=>({id:r.id,patientId:r.patient_id,authId:r.auth_id,date:r.date,time:r.time,visitType:r.visit_type,attendance:r.attendance,cptCodes:r.cpt_codes||[],coPayCollected:r.co_pay_collected,notes:r.notes||''})},
    {n:'pocs',k:'chpt_pocs',m:r=>({id:r.id,patientId:r.patient_id,evalDate:r.eval_date,certEnd:r.cert_end,dischargeGoal:r.discharge_goal,status:r.status,notes:r.notes||''})},
    {n:'reminders',k:'chpt_reminders',m:r=>({id:r.id,category:r.category,text:r.text,dueDate:r.due_date,done:r.done})},
    {n:'follow_ups',k:'chpt_followups',m:r=>({id:r.id,patientId:r.patient_id,reason:r.reason,date:r.date,resolved:r.resolved,notes:r.notes||''})},
    {n:'insur_verifs',k:'chpt_insurverifs',m:r=>({id:r.id,patientId:r.patient_id,checklist:r.checklist||{},deductible:r.deductible,copay:r.copay,oop:r.oop,oopRemaining:r.oop_remaining,visitsAllowed:r.visits_allowed,notes:r.notes||'',date:r.date})},
    {n:'closed_days',k:'chpt_closeddays',m:r=>r.day},
  ];
  for(const t of tables) {
    try {
      const {data}=await db.from(t.n).select('*').order('created_at',{ascending:true});
      if(data&&data.length>0) localStorage.setItem(t.k,JSON.stringify(data.map(t.m)));
    } catch(err) { console.warn('Load error:',t.n,err); }
  }
}

// ── APPOINTMENTS TAB ──
function AppointmentsTab({patients,auths,setAuths,appointments,setAppointments}) {
  const [closedDays,setClosedDays]=useLS('chpt_closeddays',[]);
  const toggleClosed=day=>setClosedDays(d=>d.includes(day)?d.filter(x=>x!==day):[...d,day]);
  const empty={id:'',patientId:'',authId:'',date:'',time:'',visitType:'Follow-Up',attendance:'Scheduled',cptCodes:[{code:'97110',units:1}],coPayCollected:false,notes:''};
  const [form,setForm]=useState({...empty});
  const [editing,setEditing]=useState(null);
  const [show,setShow]=useState(false);
  const [confirmDel,setConfirmDel]=useState(null);
  const [viewMode,setViewMode]=useState('week');
  const [filterDate,setFilterDate]=useState('');
  const [selPt,setSelPt]=useState('');
  const [showExport,setShowExport]=useState(false);
  const [exportRows,setExportRows]=useState([]);
  const [exportTitle,setExportTitle]=useState('');
  const [csvCopied,setCsvCopied]=useState(false);
  const [weekStart,setWeekStart]=useState(()=>{
    const d=new Date();d.setDate(d.getDate()-d.getDay()+1);return d.toISOString().slice(0,10);
  });
  const weekDays=Array.from({length:6},(_,i)=>addDays(weekStart,i));
  const DAY_NAMES=['Mon','Tue','Wed','Thu','Fri','Sat'];
  const fmtShort=d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const attColor=s=>s==='Attended'?T.green:s==='No-Show'?T.red:s==='Cancelled'?T.orange:s==='Closed'?T.textDim:T.blue;
  const getPt=id=>patients.find(p=>p.id===id);
  const getAuth=id=>auths.find(a=>a.id===id);

  const markAttended=appt=>{
    if(appt.attendance==='Attended') return;
    setAppointments(a=>a.map(x=>x.id===appt.id?{...x,attendance:'Attended'}:x));
    if(appt.authId) setAuths(a=>a.map(x=>x.id===appt.authId?{...x,visitsUsed:(Number(x.visitsUsed)||0)+1}:x));
  };

  const del=id=>{
    if(confirmDel===id){setAppointments(a=>a.filter(x=>x.id!==id));setConfirmDel(null);}
    else{setConfirmDel(id);setTimeout(()=>setConfirmDel(null),3000);}
  };

  const [recurring,setRecurring]=useState(false);
  const [recurWeeks,setRecurWeeks]=useState(4);

  const save=()=>{
    if(!form.patientId||!form.date) return alert('Patient and date required.');
    const prev=editing?appointments.find(x=>x.id===editing):null;
    const wasAttended=prev?.attendance==='Attended';
    const isNow=form.attendance==='Attended';
    if(editing){
      setAppointments(a=>a.map(x=>x.id===editing?{...form,id:editing}:x));
      if(!wasAttended&&isNow&&form.authId) setAuths(a=>a.map(x=>x.id===form.authId?{...x,visitsUsed:(Number(x.visitsUsed)||0)+1}:x));
      else if(wasAttended&&!isNow&&form.authId) setAuths(a=>a.map(x=>x.id===form.authId?{...x,visitsUsed:Math.max(0,(Number(x.visitsUsed)||0)-1)}:x));
    } else {
      if(recurring && recurWeeks > 1) {
        // Create multiple appointments weekly
        const newAppts = [];
        for(let w=0; w<recurWeeks; w++) {
          newAppts.push({...form, id:uid(), date:addDays(form.date, w*7)});
        }
        setAppointments(a=>[...a,...newAppts]);
      } else {
        setAppointments(a=>[...a,{...form,id:uid()}]);
      }
      if(isNow&&form.authId) setAuths(a=>a.map(x=>x.id===form.authId?{...x,visitsUsed:(Number(x.visitsUsed)||0)+1}:x));
    }
    setRecurring(false);setRecurWeeks(4);
    setForm({...empty});setEditing(null);setShow(false);
  };

  const filtered=appointments.filter(a=>(!filterDate||a.date===filterDate)&&(!selPt||a.patientId===selPt)).sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));

  const copyCSV=rows=>{
    const headers=['Date','Time','Patient','Chart #','Case Type','Visit Type','Attendance','Auth #','CPT Codes','Units'];
    const data=rows.map(a=>{
      const pt=getPt(a.patientId);const auth=getAuth(a.authId);
      return [a.date,a.time,pt?.initials||'',pt?.chartNum||'',pt?.caseType||'',a.visitType,a.attendance,auth?.authNum||'',(a.cptCodes||[]).map(c=>c.code+'×'+c.units).join(' | '),(a.cptCodes||[]).reduce((s,c)=>s+c.units,0)];
    });
    const csv=[headers,...data].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    navigator.clipboard.writeText(csv).then(()=>{setCsvCopied(true);setTimeout(()=>setCsvCopied(false),2500);});
  };

  const exportWeek=()=>{
    const wa=appointments.filter(a=>weekDays.includes(a.date)).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
    setExportRows(wa);
    setExportTitle('Week of '+fmtShort(weekStart)+' – '+fmtShort(addDays(weekStart,5)));
    copyCSV(wa);setShowExport(true);
  };

  const exportList=()=>{
    setExportRows(filtered);
    setExportTitle(filterDate?fmt(filterDate):'All Dates');
    copyCSV(filtered);setShowExport(true);
  };

  return e('div',null,
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
      e('span',{style:{fontSize:18,fontWeight:700}},'Appointments'),
      e('div',{style:{display:'flex',gap:8}},
        btn('📋 Biller Export',exportList,'ghost'),
        btn('+ Add Appt',()=>{setForm({...empty});setEditing(null);setShow(true)})
      )
    ),
    // View toggle
    e('div',{style:{display:'flex',gap:6,marginBottom:12}},
      ['week','list','grid'].map(m=>e('div',{key:m,onClick:()=>setViewMode(m),style:{padding:'5px 14px',borderRadius:20,fontSize:12,cursor:'pointer',fontWeight:600,background:viewMode===m?T.blue+'33':T.bgHover,border:'1px solid '+(viewMode===m?T.blue:T.border),color:viewMode===m?T.blue:T.textMuted}},m==='week'?'📅 Week View':m==='list'?'📋 List View':'📊 Daily Grid'))
    ),
    // Week view
    viewMode==='week'&&e('div',null,
      e('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}},
        btn('‹ Prev',()=>setWeekStart(w=>addDays(w,-7)),'ghost',{padding:'5px 10px'}),
        btn('Today',()=>{const d=new Date();d.setDate(d.getDate()-d.getDay()+1);setWeekStart(d.toISOString().slice(0,10));},'ghost',{padding:'5px 10px',fontSize:11}),
        btn('Next ›',()=>setWeekStart(w=>addDays(w,7)),'ghost',{padding:'5px 10px'}),
        e('span',{style:{fontSize:13,fontWeight:600,color:T.text}},fmtShort(weekStart)+' – '+fmtShort(addDays(weekStart,5))),
        btn('📋 Export Week',exportWeek,'ghost',{marginLeft:'auto',fontSize:12})
      ),
      e('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8}},
        weekDays.map((day,i)=>{
          const isToday=day===today();
          const isClosed=closedDays.includes(day);
          const dayAppts=appointments.filter(a=>a.date===day).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
          return e('div',{key:day,style:{background:isClosed?T.textDim+'18':isToday?T.blue+'18':T.bgCard,border:'1px solid '+(isClosed?T.textDim:isToday?T.blue:T.border),borderRadius:8,overflow:'hidden',minHeight:120,opacity:isClosed?.75:1}},
            e('div',{style:{padding:'7px 8px',borderBottom:'1px solid '+(isClosed?T.textDim:isToday?T.blue:T.border),background:isClosed?T.textDim+'22':isToday?T.blue+'30':T.bg,textAlign:'center'}},
              e('div',{style:{fontSize:11,fontWeight:700,color:isClosed?T.textDim:isToday?T.blue:T.textMuted}},DAY_NAMES[i]),
              e('div',{style:{fontSize:13,fontWeight:700,color:isClosed?T.textDim:isToday?T.blue:T.text}},fmtShort(day)),
              e('div',{onClick:()=>toggleClosed(day),style:{marginTop:4,fontSize:10,cursor:'pointer',fontWeight:700,color:isClosed?T.red:T.textDim,background:isClosed?T.red+'22':T.textDim+'22',borderRadius:3,padding:'2px 5px',display:'inline-block'}},isClosed?'🔒 CLOSED':'Mark Closed')
            ),
            e('div',{style:{padding:4}},
              isClosed&&e('div',{style:{fontSize:11,color:T.textDim,textAlign:'center',padding:'10px 4px',fontWeight:600}},'Office Closed'),
              !isClosed&&dayAppts.map(a=>{
                const pt=getPt(a.patientId);
                return e('div',{key:a.id,style:{background:T.bgHover,borderRadius:5,padding:'5px 7px',marginBottom:4,borderLeft:'3px solid '+attColor(a.attendance),cursor:'pointer'},onClick:()=>{setForm({...a});setEditing(a.id);setShow(true);}},
                  e('div',{style:{fontWeight:700,fontSize:12,color:T.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},
                    a.time&&e('span',{style:{color:T.textMuted,marginRight:4,fontSize:11}},a.time),
                    pt?pt.initials:'—'
                  ),
                  e('div',{style:{fontSize:10,color:T.textMuted,marginTop:1}},a.visitType),
                  e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:3}},
                    e('span',{style:{fontSize:10,color:attColor(a.attendance),fontWeight:600}},a.attendance),
                    e('div',{style:{display:'flex',gap:4}},

  const load=()=>setText(SOAP_TEMPLATES[dx]?.[vt]||'');

  return e('div',null,
    e('div',{style:{fontSize:18,fontWeight:700,marginBottom:16}},'SOAP Notes'),
    card(e('div',null,
      e('div',{style:{display:'flex',gap:12,flexWrap:'wrap',marginBottom:14}},

        field('Visit Type',e('select',{value:vt,onChange:ev=>setVt(ev.target.value),style:{width:150}},VISIT_TYPES.map(t=>e('option',{key:t},t)))),
        e('div',{style:{display:'flex',gap:8,alignItems:'flex-end',paddingBottom:1}},
          btn('Load Template',load),
          btn(copied?'✓ Copied!':'Copy to Clipboard',copy,'ghost')
        )

// ── REPORTS ──
function ReportsTab({patients,auths,appointments}) {
  const [month,setMonth]=useState(today().slice(0,7));
  const monthAppts=appointments.filter(a=>a.date.startsWith(month));
  const authData=auths.map(a=>{
    const pt=patients.find(p=>p.id===a.patientId);
    const approved=Number(a.visitsApproved)||0;
    const used=Number(a.visitsUsed)||0;
    const pct=approved>0?Math.round((used/approved)*100):0;
    const weeks=a.startDate?Math.max(1,daysBetween(a.startDate,today())/7):1;
    return {a,pt,approved,used,pct,rate:(used/weeks).toFixed(1)};
  });
  return e('div',null,
    e('div',{style:{fontSize:18,fontWeight:700,marginBottom:16}},'Reports'),
    e('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:20}},

      e('input',{type:'month',value:month,onChange:ev=>setMonth(ev.target.value),style:{width:160}})
    ),
    e('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.08em',color:T.textDim,textTransform:'uppercase',marginBottom:12}},'Auth Utilization'),
    card(
      e('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:13}},
        e('thead',null,e('tr',{style:{borderBottom:'1px solid '+T.border,color:T.textMuted,fontSize:11,textAlign:'left'}},

  );

// ── DASHBOARD ──
function DashboardTab({patients,auths,appointments,pocs,followUps}) {
  const todayStr=today();
  const todayAppts=appointments.filter(a=>a.date===todayStr);
  const attended=todayAppts.filter(a=>a.attendance==='Attended');
  const totalUnits=attended.reduce((s,a)=>(a.cptCodes||[]).reduce((su,c)=>su+c.units,s),0);
  const expiringAuths=auths.filter(a=>a.endDate&&daysBetween(todayStr,a.endDate)>=0&&daysBetween(todayStr,a.endDate)<=7);
  const lowVisits=auths.filter(a=>(Number(a.visitsApproved)||0)-(Number(a.visitsUsed)||0)<=2);
  const openFollowUps=followUps.filter(f=>!f.resolved);
  const getPt=id=>patients.find(p=>p.id===id);
  const statCard=(label,val,color)=>e('div',{style:{background:T.bgCard,border:'1px solid '+T.border,borderRadius:10,padding:'16px 20px',display:'flex',flexDirection:'column',gap:4}},
    e('span',{style:{fontSize:32,fontWeight:700,color}},val),
    e('span',{style:{fontSize:12,fontWeight:600,color:T.text}},label)
  );
  return e('div',null,
    e('div',{style:{fontSize:18,fontWeight:700,marginBottom:4}},'Dashboard'),
    e('div',{style:{fontSize:12,color:T.textMuted,marginBottom:20}},new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})),
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12,marginBottom:24}},
      statCard('Patients',patients.length,'#2a8fff'),
      statCard('Active Auths',auths.length,'#22c55e'),
      statCard("Today's Appts",todayAppts.length,'#a855f7'),
      statCard('Units Today',totalUnits,'#06b6d4'),
      statCard('Open Follow-Ups',openFollowUps.length,openFollowUps.length>0?T.orange:'#22c55e'),
      statCard('Low Visit Auths',lowVisits.length,lowVisits.length>0?T.red:'#10b981'),
      statCard('Expiring Auths',expiringAuths.length,expiringAuths.length>0?T.yellow:'#6366f1')
    ),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}},
      e('div',null,
        e('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.08em',color:T.textDim,textTransform:'uppercase',marginBottom:12}},'🚨 Alerts'),
        expiringAuths.map(a=>alert('⏰ Auth '+a.authNum+' ('+getPt(a.patientId)?.initials+') expires '+fmt(a.endDate),T.yellow)),
        lowVisits.map(a=>alert('⚠ '+getPt(a.patientId)?.initials+' — '+((Number(a.visitsApproved)||0)-(Number(a.visitsUsed)||0))+' visit(s) remaining',T.red)),
        openFollowUps.slice(0,3).map(f=>alert('📞 Follow-up: '+getPt(f.patientId)?.initials+' ('+f.reason+')',T.orange)),
        expiringAuths.length===0&&lowVisits.length===0&&openFollowUps.length===0&&e('div',{style:{color:T.green,fontSize:13,padding:'12px 0'}},'✅ No alerts! You\'re all caught up.')
      ),
      e('div',null,
        e('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.08em',color:T.textDim,textTransform:'uppercase',marginBottom:12}},'📊 End-of-Day Summary'),
        card(e('div',null,
          [['Scheduled',todayAppts.length,T.text],['Attended',attended.length,T.green],['No-Shows',todayAppts.filter(a=>a.attendance==='No-Show').length,T.red],['Cancellations',todayAppts.filter(a=>a.attendance==='Cancelled').length,T.orange],['Units Billed',totalUnits,T.blue],['Co-pays Collected',attended.filter(a=>a.coPayCollected).length+' / '+attended.length,T.green]]
          .map(([label,val,color])=>e('div',{key:label,style:{display:'flex',justifyContent:'space-between',fontSize:13,padding:'6px 0',borderBottom:'1px solid '+T.border}},
            e('span',{style:{color:T.textMuted}},label),
            e('b',{style:{color}},val)
          ))
        ))
      )
    )
  );
}



// ── DAILY GRID COMPONENT (shared by staff + biller) ──
function DailyGridView({appointments, patients}) {
  const [gridDate, setGridDate] = useState(today());

  const getPt = id => patients.find(p => p.id === id);
  const dateAppts = appointments.filter(a => a.date === gridDate && a.attendance === 'Attended');
  const allCpts = [...new Set(dateAppts.flatMap(a => (a.cptCodes||[]).map(c => c.code)))].sort();

  const fmtDate = d => new Date(d + 'T12:00:00').toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});

  const printGrid = () => {
    const rows = dateAppts.map(a => {
      const pt = getPt(a.patientId);
      const cptMap = {};
      (a.cptCodes||[]).forEach(c => { cptMap[c.code] = c.units; });
      return '<tr>' +
        '<td style="padding:8px 12px;font-weight:600;border:1px solid #ddd;white-space:nowrap">' + (pt ? ptName(pt) + ' #' + pt.chartNum : '-') + '</td>' +
        allCpts.map(code => '<td style="padding:8px;text-align:center;border:1px solid #ddd;background:' + (cptMap[code] ? '#e8f5e9' : '#fff') + '">' + (cptMap[code] ? '&#10008; ' + Number(cptMap[code]).toFixed(2) : '') + '</td>').join('') +
        '<td style="padding:8px;text-align:center;border:1px solid #ddd;font-weight:700;color:#2a8fff">' + (a.cptCodes||[]).reduce((s,c) => s+c.units, 0) + '</td>' +
      '</tr>';
    }).join('');

    const totalsRow = '<tr style="background:#f0f0f0;font-weight:700"><td style="padding:8px 12px;border:1px solid #ddd">TOTALS</td>' +
      allCpts.map(code => {
        const total = dateAppts.reduce((s,a) => { const c=(a.cptCodes||[]).find(c=>c.code===code); return s+(c?c.units:0); }, 0);
        return '<td style="padding:8px;text-align:center;border:1px solid #ddd;color:' + (total>0?'#2a8fff':'#999') + '">' + (total>0?total:'-') + '</td>';
      }).join('') +
      '<td style="padding:8px;text-align:center;border:1px solid #ddd;color:#2a8fff">' + dateAppts.reduce((s,a) => (a.cptCodes||[]).reduce((su,c) => su+c.units, s), 0) + '</td></tr>';

    const win = window.open('', '_blank');
    win.document.write('<html><head><title>Daily Treatment Grid</title><style>body{font-family:Arial,sans-serif;padding:20px;font-size:13px}table{border-collapse:collapse;width:100%}th{background:#060c14;color:white;padding:10px 12px;border:1px solid #333;text-align:center;font-size:12px}td{border:1px solid #ddd}@media print{button{display:none}}</style></head><body>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
        '<h2 style="margin:0">CHPT Physical Therapy — Daily Treatment Grid</h2>' +
        '<div><strong>' + fmtDate(gridDate) + '</strong> · ' + dateAppts.length + ' patients attended</div>' +
      '</div>' +
      '<button onclick="window.print()" style="margin-bottom:16px;padding:8px 16px;background:#2a8fff;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨 Print / Save as PDF</button>' +
      '<table><thead><tr>' +
        '<th style="text-align:left;min-width:160px">Patient</th>' +
        allCpts.map(c => '<th>' + c + '</th>').join('') +
        '<th>Total Units</th>' +
      '</tr></thead><tbody>' + rows + totalsRow + '</tbody></table>' +
      '<div style="margin-top:16px;padding:12px;background:#f5f5f5;border-radius:6px">' +
        'Total patients attended: ' + dateAppts.length + ' | Total units billed: ' + dateAppts.reduce((s,a) => (a.cptCodes||[]).reduce((su,c) => su+c.units, s), 0) +
      '</div>' +
    '</body></html>');
    win.document.close();
  };

  return e('div', null,
    // Date picker and controls
    e('div', {style:{display:'flex',alignItems:'center',gap:12,marginBottom:16,flexWrap:'wrap'}},
      e('div', {style:{display:'flex',alignItems:'center',gap:8}},
        e('button', {onClick:()=>setGridDate(d=>addDays(d,-1)), style:{background:T.bgHover,color:T.text,border:'none',borderRadius:6,padding:'6px 10px',cursor:'pointer',fontSize:14}}, '‹'),
        e('input', {type:'date', value:gridDate, onChange:ev=>setGridDate(ev.target.value), style:{width:160,fontSize:13}}),
        e('button', {onClick:()=>setGridDate(d=>addDays(d,1)), style:{background:T.bgHover,color:T.text,border:'none',borderRadius:6,padding:'6px 10px',cursor:'pointer',fontSize:14}}, '›'),
        e('button', {onClick:()=>setGridDate(today()), style:{background:T.bgHover,color:T.textMuted,border:'none',borderRadius:6,padding:'6px 10px',cursor:'pointer',fontSize:12}}, 'Today')
      ),
      e('span', {style:{fontSize:13,fontWeight:600,color:T.blue}}, fmtDate(gridDate)),
      e('button', {
        onClick: printGrid,
        style:{background:T.blue,color:'#fff',border:'none',borderRadius:6,padding:'7px 14px',fontSize:12,fontWeight:600,cursor:'pointer',marginLeft:'auto'}
      }, '🖨 Print Grid')
    ),

    // Grid table
    e('div', {style:{background:T.bgCard,border:'1px solid '+T.border,borderRadius:10,overflow:'auto'}},
      dateAppts.length === 0
        ? e('div', {style:{color:T.textMuted,textAlign:'center',padding:60,fontSize:14}},
            gridDate === today() ? 'No attended appointments today yet.' : 'No attended appointments on ' + fmtDate(gridDate) + '.'
          )
        : e('table', {style:{width:'100%',borderCollapse:'collapse',fontSize:13,minWidth:500}},
            e('thead', null,
              e('tr', null,
                e('th', {style:{padding:'10px 14px',background:T.bg,borderBottom:'2px solid '+T.border,borderRight:'1px solid '+T.border,textAlign:'left',fontSize:12,color:T.textMuted,fontWeight:700,whiteSpace:'nowrap',minWidth:160}}, 'Patient'),
                allCpts.map(code => e('th', {key:code, style:{padding:'10px 8px',background:T.bg,borderBottom:'2px solid '+T.border,borderRight:'1px solid '+T.border,textAlign:'center',fontSize:11,color:T.blue,fontWeight:700,minWidth:70}}, code)),
                e('th', {style:{padding:'10px 8px',background:T.bg,borderBottom:'2px solid '+T.border,textAlign:'center',fontSize:12,color:T.textMuted,fontWeight:700,minWidth:70}}, 'Total Units')
              )
            ),
            e('tbody', null,
              dateAppts.map((a, i) => {
                const pt = getPt(a.patientId);
                const cptMap = {};
                (a.cptCodes||[]).forEach(c => { cptMap[c.code] = c.units; });
                const totalUnits = (a.cptCodes||[]).reduce((s,c) => s+c.units, 0);
                return e('tr', {key:a.id, style:{background:i%2===0?T.bgCard:T.bg}},
                  e('td', {style:{padding:'10px 14px',borderBottom:'1px solid '+T.border,borderRight:'1px solid '+T.border,fontWeight:600,whiteSpace:'nowrap'}},
                    pt ? ptName(pt) + ' #' + pt.chartNum : '—'
                  ),
                  allCpts.map(code => e('td', {key:code, style:{padding:'10px 8px',borderBottom:'1px solid '+T.border,borderRight:'1px solid '+T.border,textAlign:'center'}},
                    cptMap[code]
                      ? e('div', {style:{display:'flex',flexDirection:'column',alignItems:'center',gap:2}},
                          e('span', {style:{color:T.green,fontWeight:700,fontSize:18}}, '✘'),
                          e('span', {style:{fontSize:11,color:T.textMuted}}, Number(cptMap[code]).toFixed(2))
                        )
                      : e('span', {style:{color:T.border}}, '—')
                  )),
                  e('td', {style:{padding:'10px 8px',borderBottom:'1px solid '+T.border,textAlign:'center',fontWeight:700,color:T.blue,fontSize:15}}, totalUnits)
                );
              }),
              // Totals row
              e('tr', {style:{background:T.bg,borderTop:'2px solid '+T.border}},
                e('td', {style:{padding:'10px 14px',fontWeight:700,color:T.text,borderRight:'1px solid '+T.border}}, 'TOTALS'),
                allCpts.map(code => {
                  const total = dateAppts.reduce((s,a) => { const c=(a.cptCodes||[]).find(c=>c.code===code); return s+(c?c.units:0); }, 0);
                  return e('td', {key:code, style:{padding:'10px 8px',textAlign:'center',fontWeight:700,color:total>0?T.blue:T.textDim,borderRight:'1px solid '+T.border}}, total > 0 ? total : '—');
                }),
                e('td', {style:{padding:'10px 8px',textAlign:'center',fontWeight:700,color:T.blue,fontSize:15}},
                  dateAppts.reduce((s,a) => (a.cptCodes||[]).reduce((su,c) => su+c.units, s), 0)
                )
              )
            )
          )
    ),

    // Summary
    dateAppts.length > 0 && e('div', {style:{marginTop:12,fontSize:12,color:T.textMuted,textAlign:'right'}},
      dateAppts.length + ' patient' + (dateAppts.length!==1?'s':'') + ' attended · ' +
      dateAppts.reduce((s,a) => (a.cptCodes||[]).reduce((su,c) => su+c.units, s), 0) + ' total units billed'
    )
  );
}

// ── BILLER VIEW ──
function BillerView({patients,auths,appointments}) {
  const [startDate,setStartDate]=useState(()=>today().slice(0,8)+'01');
  const [endDate,setEndDate]=useState(today());
  const [billerNotes,setBillerNotes]=useLS('chpt_billernotes',[]);
  const [noteText,setNoteText]=useState('');
  const [viewMode,setViewMode]=useState('list');
  const [weekStart,setWeekStart]=useState(()=>{
    const d=new Date();d.setDate(d.getDate()-d.getDay()+1);return d.toISOString().slice(0,10);
  });
  const weekDays=Array.from({length:6},(_,i)=>addDays(weekStart,i));
  const DAY_NAMES=['Mon','Tue','Wed','Thu','Fri','Sat'];
  const fmtShort=d=>new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const addNote=()=>{
    if(!noteText.trim()) return;
    setBillerNotes(n=>[{id:uid(),text:noteText,date:today(),ts:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})},...n]);
    setNoteText('');
  };
  const delNote=id=>setBillerNotes(n=>n.filter(x=>x.id!==id));
  const getPt=id=>patients.find(p=>p.id===id);
  const getAuth=id=>auths.find(a=>a.id===id);
  const attColor=s=>s==='Attended'?T.green:s==='No-Show'?T.red:s==='Cancelled'?T.orange:T.blue;
  const [billerSearch,setBillerSearch]=useState('');

  const filtered=appointments
    .filter(a=>(!startDate||a.date>=startDate)&&(!endDate||a.date<=endDate))
    .sort((a,b)=>a.date.localeCompare(b.date));

  const billerFiltered=billerSearch
    ? filtered.filter(a=>{
        const pt=getPt(a.patientId);
        if(!pt) return false;
        const q=billerSearch.toLowerCase();
        return ptName(pt).toLowerCase().includes(q) ||
          pt.chartNum.includes(q);
      })
    : filtered;

  const attended=filtered.filter(a=>a.attendance==='Attended');
  const totalUnits=attended.reduce((s,a)=>(a.cptCodes||[]).reduce((su,c)=>su+c.units,s),0);

  const printView=()=>{
    const rows=filtered.map(a=>{
      const pt=getPt(a.patientId);
      const auth=getAuth(a.authId);
      const cpts=(a.cptCodes||[]).map(c=>c.code+' x'+c.units).join(', ');
      const units=(a.cptCodes||[]).reduce((s,c)=>s+c.units,0);
      return '<tr style="border-bottom:1px solid #ddd">'+
        '<td style="padding:8px">'+new Date(a.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</td>'+
        '<td style="padding:8px;font-weight:bold">'+( pt?.chartNum||'-')+'</td>'+
        '<td style="padding:8px">'+( pt?.initials||'-')+(pt?.shortId?' ['+pt.shortId+']':'')+'</td>'+
        '<td style="padding:8px">'+( pt?.caseType||'-')+'</td>'+
        '<td style="padding:8px">'+a.visitType+'</td>'+
        '<td style="padding:8px;color:'+(a.attendance==='Attended'?'green':a.attendance==='No-Show'?'red':'orange')+'">'+a.attendance+'</td>'+
        '<td style="padding:8px;font-family:monospace;font-size:12px">'+( cpts||'-')+'</td>'+
        '<td style="padding:8px;font-weight:bold;text-align:center">'+( units||'-')+'</td>'+
        '<td style="padding:8px">'+( auth?.authNum||'-')+'</td>'+
      '</tr>';
    }).join('');

    const win=window.open('','_blank');
    win.document.write('<html><head><title>CHPT Biller Export</title><style>body{font-family:Arial,sans-serif;font-size:13px;padding:20px}table{width:100%;border-collapse:collapse}th{background:#f0f0f0;padding:8px;text-align:left;border-bottom:2px solid #999;font-size:12px}td{border-bottom:1px solid #eee}@media print{button{display:none}}</style></head><body>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">'+
        '<div><h2 style="margin:0">CHPT Physical Therapy — Billing Export</h2>'+
        '<p style="margin:4px 0;color:#666">'+startDate+' to '+endDate+' · '+filtered.length+' appointments · '+attended.length+' attended · '+totalUnits+' total units</p></div>'+
        '<button onclick="window.print()" style="padding:8px 16px;background:#2a8fff;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px">🖨 Print / Save PDF</button>'+
      '</div>'+
      '<table><thead><tr><th>Date</th><th>Chart #</th><th>Patient</th><th>Case</th><th>Visit Type</th><th>Attendance</th><th>CPT Codes</th><th>Units</th><th>Auth #</th></tr></thead>'+
      '<tbody>'+rows+'</tbody></table>'+
      '<div style="margin-top:20px;padding:12px;background:#f9f9f9;border:1px solid #ddd;border-radius:6px">'+
        '<strong>Summary:</strong> Total appointments: '+filtered.length+' | Attended: '+attended.length+' | Total units billed: '+totalUnits+
      '</div>'+
    '</body></html>');
    win.document.close();
  };

  return e('div',{style:{background:T.bg,minHeight:'100vh',color:T.text,fontFamily:"'DM Sans',sans-serif"}},
    // Header
    e('div',{style:{background:T.bgCard,borderBottom:'1px solid '+T.border,padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      e('div',null,
        e('div',{style:{fontSize:16,fontWeight:700,color:T.blue}},'CHPT Billing Portal'),
        e('div',{style:{fontSize:11,color:T.textMuted}},'Read-only access · '+filtered.length+' appointments in range')
      ),
      e('span',{onClick:()=>{sessionStorage.removeItem('chpt_auth');window.location.reload();},style:{color:T.red,cursor:'pointer',fontSize:12,fontWeight:600}},'Sign Out')
    ),
    e('div',{style:{padding:'20px 24px'}},
      // Staff Notes for Biller
      e('div',{style:{background:T.bgCard,border:'1px solid '+T.border,borderRadius:10,padding:16,marginBottom:20}},
        e('div',{style:{fontSize:14,fontWeight:700,marginBottom:12,color:T.blue}},'📋 Staff Notes'),
        e('div',{style:{display:'flex',gap:8,marginBottom:12}},
          e('textarea',{rows:2,value:noteText,onChange:ev=>setNoteText(ev.target.value),placeholder:'Leave a note for the biller about a patient, claim, or anything else...',style:{flex:1,resize:'none'}}),
          btn('Add Note',addNote,'primary',{alignSelf:'flex-end',whiteSpace:'nowrap'})
        ),
        billerNotes.length===0&&e('div',{style:{color:T.textMuted,fontSize:12,textAlign:'center',padding:'8px 0'}},'No notes yet.'),
        billerNotes.map(n=>e('div',{key:n.id,style:{background:T.bgHover,borderRadius:8,padding:'10px 14px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
          e('div',null,
            e('div',{style:{fontSize:13,color:T.text,marginBottom:4}},n.text),
            e('div',{style:{fontSize:11,color:T.textMuted}},fmt(n.date)+' · '+n.ts)
          ),
          e('span',{onClick:()=>delNote(n.id),style:{color:T.red,cursor:'pointer',fontSize:18,lineHeight:1,marginLeft:8}},'×')
        ))
      ),
      // View toggle
      e('div',{style:{display:'flex',gap:6,marginBottom:12}},
        ['week','list','grid'].map(m=>e('div',{key:m,onClick:()=>setViewMode(m),style:{padding:'5px 14px',borderRadius:20,fontSize:12,cursor:'pointer',fontWeight:600,background:viewMode===m?T.blue+'33':T.bgHover,border:'1px solid '+(viewMode===m?T.blue:T.border),color:viewMode===m?T.blue:T.textMuted}},m==='week'?'📅 Week View':m==='list'?'📋 List View':'📊 Daily Grid'))
      ),

      // Daily Grid View (Biller)
      viewMode==='grid'&&e(DailyGridView,{appointments,patients}),

      // Filters (list view only)
      viewMode==='list'&&e('div',{style:{background:T.bgCard,border:'1px solid '+T.border,borderRadius:10,padding:16,marginBottom:20}},
        e('div',{style:{display:'flex',gap:16,flexWrap:'wrap',alignItems:'flex-end',marginBottom:12}},
          field('From Date',e('input',{type:'date',value:startDate,onChange:ev=>setStartDate(ev.target.value),style:{width:160}})),
          field('To Date',e('input',{type:'date',value:endDate,onChange:ev=>setEndDate(ev.target.value),style:{width:160}})),
          e('div',{style:{paddingBottom:1}},
            btn('🖨 Print / Save as PDF',printView,'primary')
          )
        ),
        e('div',{style:{position:'relative'}},
          e('input',{
            value:billerSearch,
            onChange:ev=>setBillerSearch(ev.target.value),
            placeholder:'🔍 Search by patient initials, short ID or chart #...',
            style:{width:'100%',fontSize:13}
          }),
          billerSearch&&e('span',{
            onClick:()=>setBillerSearch(''),
            style:{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',cursor:'pointer',color:T.textMuted,fontSize:16}
          },'×')
        ),
        billerSearch&&e('div',{style:{fontSize:12,color:T.textMuted,marginTop:6}},billerFiltered.length+' appointment'+(billerFiltered.length!==1?'s':'')+' found')
      ),

      // Week view
      viewMode==='week'&&e('div',{style:{marginBottom:20}},
        e('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}},
          btn('‹ Prev',()=>setWeekStart(w=>addDays(w,-7)),'ghost',{padding:'5px 10px'}),
          btn('Today',()=>{const d=new Date();d.setDate(d.getDate()-d.getDay()+1);setWeekStart(d.toISOString().slice(0,10));},'ghost',{padding:'5px 10px',fontSize:11}),
          btn('Next ›',()=>setWeekStart(w=>addDays(w,7)),'ghost',{padding:'5px 10px'}),
          e('span',{style:{fontSize:13,fontWeight:600,color:T.text}},fmtShort(weekStart)+' – '+fmtShort(addDays(weekStart,5))),
          btn('🖨 Print Week',()=>{
            const wa=appointments.filter(a=>weekDays.includes(a.date));
            setStartDate(weekStart);setEndDate(addDays(weekStart,5));
            setTimeout(()=>printView(),100);
          },'primary',{marginLeft:'auto',fontSize:12})
        ),
        e('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8}},
          weekDays.map((day,i)=>{
            const isToday=day===today();
            const dayAppts=appointments.filter(a=>a.date===day).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
            const attColor=s=>s==='Attended'?T.green:s==='No-Show'?T.red:s==='Cancelled'?T.orange:T.blue;
            return e('div',{key:day,style:{background:isToday?T.blue+'18':T.bgCard,border:'1px solid '+(isToday?T.blue:T.border),borderRadius:8,overflow:'hidden',minHeight:120}},
              e('div',{style:{padding:'7px 8px',borderBottom:'1px solid '+(isToday?T.blue:T.border),background:isToday?T.blue+'30':T.bg,textAlign:'center'}},
                e('div',{style:{fontSize:11,fontWeight:700,color:isToday?T.blue:T.textMuted}},DAY_NAMES[i]),
                e('div',{style:{fontSize:13,fontWeight:700,color:isToday?T.blue:T.text}},fmtShort(day)),
                e('div',{style:{fontSize:10,color:T.textMuted}},dayAppts.length+' appt'+(dayAppts.length!==1?'s':''))
              ),
              e('div',{style:{padding:4}},
                dayAppts.map(a=>{
                  const pt=patients.find(p=>p.id===a.patientId);
                  return e('div',{key:a.id,style:{background:T.bgHover,borderRadius:5,padding:'5px 7px',marginBottom:4,borderLeft:'3px solid '+attColor(a.attendance)}},
                    e('div',{style:{fontWeight:700,fontSize:11,color:T.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},
                      a.time&&e('span',{style:{color:T.textMuted,marginRight:4,fontSize:10}},a.time),
                      pt?ptName(pt):'—'
                    ),
                    e('div',{style:{fontSize:10,color:T.textMuted}},a.visitType),
                    e('div',{style:{fontSize:10,color:attColor(a.attendance),fontWeight:600}},a.attendance),
                    (a.cptCodes||[]).length>0&&e('div',{style:{fontSize:9,color:T.textDim,fontFamily:'monospace'}},(a.cptCodes).map(c=>c.code+'x'+c.units).join(' '))
                  );
                }),
                dayAppts.length===0&&e('div',{style:{fontSize:11,color:T.textDim,textAlign:'center',padding:'12px 4px'}},'—')
              )
            );
          })
        )
      ),
      // Summary cards
      e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:12,marginBottom:20}},
        [{label:'Total Appointments',val:filtered.length,color:T.blue},
         {label:'Attended',val:attended.length,color:T.green},
         {label:'No-Shows',val:filtered.filter(a=>a.attendance==='No-Show').length,color:T.red},
         {label:'Cancelled',val:filtered.filter(a=>a.attendance==='Cancelled').length,color:T.orange},
         {label:'Total Units',val:totalUnits,color:T.blue}
        ].map(s=>e('div',{key:s.label,style:{background:T.bgCard,border:'1px solid '+T.border,borderRadius:10,padding:'12px 16px'}},
          e('div',{style:{fontSize:26,fontWeight:700,color:s.color}},s.val),
          e('div',{style:{fontSize:11,color:T.textMuted}},s.label)
        ))
      ),
      // Table
      e('div',{style:{background:T.bgCard,border:'1px solid '+T.border,borderRadius:10,overflow:'hidden'}},
        // Header
        e('div',{style:{display:'grid',gridTemplateColumns:'110px 80px 80px 90px 100px 95px 160px 55px 90px',gap:0,borderBottom:'2px solid '+T.border,padding:'10px 0',background:T.bg}},
          ['Date','Chart #','Patient','Case','Visit Type','Attendance','CPT Codes','Units','Auth #'].map(h=>
            e('div',{key:h,style:{fontSize:11,fontWeight:700,color:T.textMuted,padding:'0 10px'}},h)
          )
        ),
        // Rows
        e('div',{style:{maxHeight:'60vh',overflowY:'auto'}},
          billerFiltered.length===0&&e('div',{style:{color:T.textMuted,textAlign:'center',padding:40}},billerSearch?'No patients match your search.':'No appointments in this date range.'),
          billerFiltered.map((a,i)=>{
            const pt=getPt(a.patientId);
            const auth=getAuth(a.authId);
            const ac=attColor(a.attendance);
            const cpts=(a.cptCodes||[]).map(c=>c.code+' x'+c.units).join(', ');
            const units=(a.cptCodes||[]).reduce((s,c)=>s+c.units,0);
            return e('div',{key:a.id,style:{display:'grid',gridTemplateColumns:'110px 80px 80px 90px 100px 95px 160px 55px 90px',alignItems:'center',padding:'10px 0',borderBottom:'1px solid '+T.border,background:i%2===0?T.bgCard:T.bg}},
              e('div',{style:{padding:'0 10px',fontSize:12}},new Date(a.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})),
              e('div',{style:{padding:'0 10px',fontWeight:700,color:T.blue,fontSize:13}},pt?.chartNum||'—'),
              e('div',{style:{padding:'0 10px',fontSize:12,fontWeight:600}},pt?ptName(pt):'—'),
              e('div',{style:{padding:'0 10px',fontSize:11,color:T.textMuted}},pt?.caseType||'—'),
              e('div',{style:{padding:'0 10px',fontSize:12}},a.visitType),
              e('div',{style:{padding:'0 10px'}},badge(a.attendance,ac)),
              e('div',{style:{padding:'0 10px',fontSize:11,fontFamily:'monospace',color:T.text}},cpts||'—'),
              e('div',{style:{padding:'0 10px',fontWeight:700,color:T.blue,textAlign:'center'}},units||'—'),
              e('div',{style:{padding:'0 10px',fontSize:11,color:T.textMuted}},auth?.authNum||'—')
            );
          })
        )
      )
    )
  );
}



// ── CASE CHECKLIST TAB ──
function CaseChecklistTab({patients}) {
  const [selectedPt,setSelectedPt]=useState('');
  const [checks,setChecks]=useLS('chpt_casechecks',{});

  const pt=patients.find(p=>p.id===selectedPt);
  const isWC=pt?.caseType==='Workers Comp';
  const isNF=pt?.caseType==='No Fault';
  const checklist=isWC?WC_CHECKLIST:isNF?NF_CHECKLIST:null;

  const toggleCheck=(ptId,item)=>{
    setChecks(c=>({...c,[ptId]:{...(c[ptId]||{}),[item]:!(c[ptId]||{})[item]}}));
  };

  const ptChecks=checks[selectedPt]||{};
  const allItems=checklist?Object.values(checklist).flat():[];
  const doneCount=allItems.filter(i=>ptChecks[i]).length;
  const pct=allItems.length>0?Math.round((doneCount/allItems.length)*100):0;

  const wcNfPatients=patients.filter(p=>p.caseType==='Workers Comp'||p.caseType==='No Fault');

  return e('div',null,
    e('div',{style:{fontSize:18,fontWeight:700,marginBottom:4}},'Case Checklists'),
    e('div',{style:{fontSize:12,color:T.textMuted,marginBottom:16}},'Documentation checklists for Workers Comp and No Fault patients.'),

    // Patient selector
    card(e('div',null,
      e('div',{style:{display:'flex',gap:12,alignItems:'flex-end',flexWrap:'wrap'}},
        e('div',{style:{flex:1}},
          field('Select Patient (Workers Comp or No Fault)',
            e('select',{value:selectedPt,onChange:ev=>setSelectedPt(ev.target.value),style:{width:'100%'}},
              [e('option',{key:'',value:''},'— Select a WC or No Fault patient —'),
              ...wcNfPatients.map(p=>e('option',{key:p.id,value:p.id},
                ptName(p)+' #'+p.chartNum+' — '+p.caseType
              ))]
            )
          )
        )
      ),
      selectedPt&&checklist&&e('div',{style:{marginTop:12}},
        e('div',{style:{display:'flex',justifyContent:'space-between',fontSize:12,color:T.textMuted,marginBottom:6}},
          e('span',null,'Documentation Progress'),
          e('span',null,doneCount+'/'+allItems.length+' items ('+pct+'%)')
        ),
        progress(doneCount,allItems.length,pct===100?T.green:pct>=70?T.yellow:T.red)
      )
    )),

    // No WC/NF patients
    wcNfPatients.length===0&&e('div',{style:{color:T.textMuted,textAlign:'center',padding:40}},'No Workers Comp or No Fault patients added yet.'),

    // Checklist
    selectedPt&&checklist&&e('div',null,
      Object.entries(checklist).map(([section,items])=>
        card(e('div',null,
          e('div',{style:{fontSize:13,fontWeight:700,color:T.blue,marginBottom:12}},section),
          items.map(item=>e('div',{key:item,style:{display:'flex',alignItems:'center',gap:10,padding:'6px 0',borderBottom:'1px solid '+T.border}},
            e('input',{
              type:'checkbox',
              checked:!!ptChecks[item],
              onChange:()=>toggleCheck(selectedPt,item),
              style:{width:'auto',flexShrink:0}
            }),
            e('label',{
              onClick:()=>toggleCheck(selectedPt,item),
              style:{
                fontSize:13,
                color:ptChecks[item]?T.textMuted:T.text,
                textDecoration:ptChecks[item]?'line-through':'none',
                cursor:'pointer',
                flex:1
              }
            },item),
            ptChecks[item]&&e('span',{style:{color:T.green,fontSize:14,flexShrink:0}},'✓')
          ))
        ),{key:section})
      ),

      // Summary alert
      pct===100&&e('div',{style:{background:T.green+'15',border:'1px solid '+T.green+'44',borderRadius:8,padding:'12px 16px',fontSize:13,color:T.green,marginTop:8}},
        '✅ All documentation complete for '+pt.initials+'! Ready for billing.'
      ),
      pct<100&&pct>0&&e('div',{style:{background:T.yellow+'15',border:'1px solid '+T.yellow+'44',borderRadius:8,padding:'12px 16px',fontSize:13,color:T.yellow,marginTop:8}},
        '⚠ '+( allItems.length-doneCount)+' item(s) still needed for '+pt.initials+'. Complete before billing.'
      )
    ),

    // No checklist for this case type
    selectedPt&&!checklist&&e('div',{style:{color:T.textMuted,textAlign:'center',padding:40}},
      'This patient is '+pt?.caseType+' — no special checklist required.'
    )
  );
}

// ── BILLER NOTES TAB (Staff Side) ──
function BillerNotesTab() {
  const [billerNotes,setBillerNotes]=useLS('chpt_billernotes',[]);
  const [noteText,setNoteText]=useState('');
  const addNote=()=>{
    if(!noteText.trim()) return;
    setBillerNotes(n=>[{id:uid(),text:noteText,date:today(),ts:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})},...n]);
    setNoteText('');
  };
  const delNote=id=>setBillerNotes(n=>n.filter(x=>x.id!==id));

  return e('div',null,
    e('div',{style:{fontSize:18,fontWeight:700,marginBottom:4}},'Biller Notes'),
    e('div',{style:{fontSize:12,color:T.textMuted,marginBottom:16}},'Notes left here are visible to your biller when they log in.'),
    card(e('div',null,
      e('div',{style:{marginBottom:12}},
        e('label',{style:{fontSize:12,color:T.textMuted,fontWeight:500,display:'block',marginBottom:4}},'New Note'),
        e('textarea',{
          rows:4,
          value:noteText,
          onChange:ev=>setNoteText(ev.target.value),
          placeholder:'e.g. Patient SMI-J visited 5x this month — not yet in system. CPT 97110x2, 97140x1 per visit. Please add manually to billing...',
          style:{width:'100%',marginBottom:8}
        }),
        btn('Add Note for Biller',addNote,'primary')
      )
    )),
    e('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.08em',color:T.textDim,textTransform:'uppercase',marginBottom:12,marginTop:8}},
      'Notes ('+billerNotes.length+')'
    ),
    billerNotes.length===0&&e('div',{style:{color:T.textMuted,textAlign:'center',padding:40}},'No notes yet. Add one above to communicate with your biller.'),
    billerNotes.map(n=>card(
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
        e('div',{style:{flex:1}},
          e('div',{style:{fontSize:13,color:T.text,lineHeight:1.6,marginBottom:6}},n.text),
          e('div',{style:{fontSize:11,color:T.textMuted}},'Added: '+fmt(n.date)+' at '+n.ts)
        ),
        e('div',{style:{display:'flex',gap:6,marginLeft:12}},
          btn('Del',()=>delNote(n.id),'danger',{padding:'4px 10px',fontSize:11})
        )
      ),
      {key:n.id}
    ))
  );
}

// ── MAIN APP ──
function App() {
  const [role,setRole]=useState(()=>sessionStorage.getItem('chpt_auth')||'');
  const loggedIn=role==='staff'||role==='biller';
  const [loading,setLoading]=useState(false);
  const [tab,setTab]=useState('dashboard');
  const [patients,setPatients]=useLS('chpt_patients',[]);
  const [auths,setAuths]=useLS('chpt_auths',[]);
  const [appointments,setAppointments]=useLS('chpt_appointments',[]);
  const [reminders,setReminders]=useLS('chpt_reminders',[]);
  const [followUps,setFollowUps]=useLS('chpt_followups',[]);
  const [pocs,setPocs]=useLS('chpt_pocs',[]);
  const [insurVerifs,setInsurVerifs]=useLS('chpt_insurverifs',[]);

  const handleLogin=async(r)=>{
    setLoading(true);
    await loadFromSupabase();
    setLoading(false);
    setRole(r);
    window.location.reload();
  };

  // Send email alerts once per day when staff logs in
  useEffect(()=>{
    if(role==='staff' && patients.length>0 && auths.length>0) {
      checkAndSendAlerts(auths, patients);
    }
  },[role, patients.length, auths.length]);

  const alertCount=useMemo(()=>{
    const exp=auths.filter(a=>a.endDate&&daysBetween(today(),a.endDate)>=0&&daysBetween(today(),a.endDate)<=7).length;
    const low=auths.filter(a=>(Number(a.visitsApproved)||0)-(Number(a.visitsUsed)||0)<=2).length;
    const open=followUps.filter(f=>!f.resolved).length;
    return exp+low+open;
  },[auths,followUps]);

  if(!loggedIn) return e(LoginScreen,{onLogin:handleLogin});
  if(loading) return e(LoadingScreen,null);
  if(role==='biller') return e(BillerView,{patients,auths,appointments});

  const sidebarStyle={width:220,background:T.bgCard,borderRight:'1px solid '+T.border,display:'flex',flexDirection:'column',flexShrink:0,overflowY:'auto'};

  return e('div',{style:{background:T.bg,minHeight:'100vh',color:T.text,fontFamily:"'DM Sans',sans-serif"}},
    e('div',{style:{display:'flex',height:'100vh',overflow:'hidden'}},
      e('div',{style:sidebarStyle},
        e('div',{style:{padding:'18px 16px 12px',borderBottom:'1px solid '+T.border,fontSize:13,fontWeight:700,color:T.blue,letterSpacing:'0.02em',lineHeight:1.3}},
          'CHPT',e('br'),e('span',{style:{fontSize:10,fontWeight:400,color:T.textMuted,letterSpacing:'0.04em'}},'WORKFLOW / TRACKER')
        ),
        e('nav',{style:{padding:'8px 0',flex:1}},
          TABS.map(t=>e('div',{key:t.id,onClick:()=>setTab(t.id),style:{display:'flex',alignItems:'center',gap:8,padding:'9px 16px',cursor:'pointer',fontSize:13,fontWeight:500,color:tab===t.id?T.blue:T.textMuted,background:tab===t.id?T.blue+'18':'transparent',borderLeft:'3px solid '+(tab===t.id?T.blue:'transparent')}},
            e('span',null,t.icon),
            e('span',null,t.label),
            t.id==='dashboard'&&alertCount>0&&e('span',{style:{marginLeft:'auto',background:T.red,color:'#fff',borderRadius:99,fontSize:10,fontWeight:700,padding:'1px 6px'}},alertCount)
          ))
        ),
        e('div',{style:{padding:'12px 16px',borderTop:'1px solid '+T.border,fontSize:10,color:T.textDim,lineHeight:1.6}},
          'v2.0 · Cloud Sync',e('br'),
          e('span',{onClick:()=>{sessionStorage.removeItem('chpt_auth');window.location.reload();},style:{color:T.red,cursor:'pointer',fontSize:11}},'Sign Out')
        )
      ),
      e('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
        e('div',{style:{padding:'14px 24px',borderBottom:'1px solid '+T.border,background:T.bgCard,display:'flex',alignItems:'center',justifyContent:'space-between'}},
          e('span',{style:{fontSize:15,fontWeight:700}},TABS.find(t=>t.id===tab)?.icon+' '+TABS.find(t=>t.id===tab)?.label),
          e('div',{style:{fontSize:12,color:T.textMuted}},patients.length+' patients · '+auths.length+' auths · '+appointments.filter(a=>a.date===today()).length+' appts today')
        ),
        e('div',{style:{flex:1,overflowY:'auto',padding:'20px 24px'}},
          tab==='dashboard'&&e(DashboardTab,{patients,auths,appointments,pocs,followUps}),
          tab==='patients'&&e(PatientsTab,{patients,setPatients}),
          tab==='auths'&&e(AuthsTab,{patients,auths,setAuths}),
          tab==='appointments'&&e(AppointmentsTab,{patients,auths,setAuths,appointments,setAppointments}),
          tab==='soap'&&e(SOAPTab,{patients}),
          tab==='reminders'&&e(RemindersTab,{reminders,setReminders}),
          tab==='followup'&&e(FollowUpTab,{patients,followUps,setFollowUps}),
          tab==='poc'&&e(PlanOfCareTab,{patients,pocs,setPocs}),
          tab==='insur'&&e(InsuranceVerifTab,{patients,insurVerifs,setInsurVerifs}),
          tab==='reports'&&e(ReportsTab,{patients,auths,appointments}),
          tab==='summary'&&e(SummaryTab,{patients,appointments}),
          tab==='billernotes'&&e(BillerNotesTab,null),
          tab==='casechecklist'&&e(CaseChecklistTab,{patients})
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
</script>
</body>
