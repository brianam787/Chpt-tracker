// localStorage hook
function useLS(key, init) {
const [val, setVal] = useState(() => {
try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch { return init; }
});
const set = useCallback(v => {
setVal(prev => {
const next = typeof v===‘function’ ? v(prev) : v;
try { localStorage.setItem(key, JSON.stringify(next)); syncToSupabase(key, next); } catch {}
return next;
});
}, [key]);
return [val, set];
}

// Supabase sync
async function syncToSupabase(key, data) {
try {
const maps = {
‘chpt_patients’: {t:‘patients’, r:p=>({id:p.id,initials:p.initials,chart_num:p.chartNum,case_type:p.caseType,co_pay:p.coPay,referring_provider:p.referringProvider,icd10:p.icd10,custom_dx:p.customDx,goals:p.goals||[],notes:p.notes||’’})},
‘chpt_auths’: {t:‘auths’, r:a=>({id:a.id,patient_id:a.patientId,auth_num:a.authNum,insurance:a.insurance,start_date:a.startDate,end_date:a.endDate,visits_approved:Number(a.visitsApproved)||0,visits_used:Number(a.visitsUsed)||0,expiry_reminder:Number(a.expiryReminder)||7})},
‘chpt_appointments’: {t:‘appointments’, r:a=>({id:a.id,patient_id:a.patientId,auth_id:a.authId||null,date:a.date,time:a.time,visit_type:a.visitType,attendance:a.attendance,cpt_codes:a.cptCodes||[],co_pay_collected:a.coPayCollected,notes:a.notes||’’})},
‘chpt_pocs’: {t:‘pocs’, r:p=>({id:p.id,patient_id:p.patientId,eval_date:p.evalDate,cert_end:p.certEnd,discharge_goal:p.dischargeGoal,status:p.status,notes:p.notes||’’})},
‘chpt_reminders’: {t:‘reminders’, r:r=>({id:r.id,category:r.category,text:r.text,due_date:r.dueDate,done:r.done})},
‘chpt_followups’: {t:‘follow_ups’, r:f=>({id:f.id,patient_id:f.patientId,reason:f.reason,date:f.date,resolved:f.resolved,notes:f.notes||’’})},
‘chpt_insurverifs’: {t:‘insur_verifs’, r:v=>({id:v.id,patient_id:v.patientId,checklist:v.checklist||{},deductible:v.deductible,copay:v.copay,oop:v.oop,oop_remaining:v.oopRemaining,visits_allowed:v.visitsAllowed,notes:v.notes||’’,date:v.date})},
};
if (key===‘chpt_closeddays’) {
const days=Array.isArray(data)?data:[];
const {data:ex}=await db.from(‘closed_days’).select(‘day’);
const exDays=(ex||[]).map(r=>r.day);
for(const d of days) if(!exDays.includes(d)) await db.from(‘closed_days’).insert({id:uid(),day:d});
for(const d of exDays) if(!days.includes(d)) await db.from(‘closed_days’).delete().eq(‘day’,d);
return;
}
const cfg=maps[key];
if(!cfg||!Array.isArray(data)) return;
if(data.length>0) await db.from(cfg.t).upsert(data.map(cfg.r),{onConflict:‘id’});
const {data:ex}=await db.from(cfg.t).select(‘id’);
if(ex) {
const ids=data.map(r=>r.id);
for(const r of ex.filter(r=>!ids.includes(r.id))) await db.from(cfg.t).delete().eq(‘id’,r.id);
}
} catch(err) { console.warn(‘Sync error:’,err); }
}

// Load from Supabase on login
async function loadFromSupabase() {
const tables = [
{n:‘patients’,k:‘chpt_patients’,m:r=>({id:r.id,initials:r.initials,chartNum:r.chart_num,caseType:r.case_type,coPay:r.co_pay,referringProvider:r.referring_provider,icd10:r.icd10,customDx:r.custom_dx,goals:r.goals||[],notes:r.notes||’’})},
{n:‘auths’,k:‘chpt_auths’,m:r=>({id:r.id,patientId:r.patient_id,authNum:r.auth_num,insurance:r.insurance,startDate:r.start_date,endDate:r.end_date,visitsApproved:r.visits_approved,visitsUsed:r.visits_used,expiryReminder:r.expiry_reminder})},
{n:‘appointments’,k:‘chpt_appointments’,m:r=>({id:r.id,patientId:r.patient_id,authId:r.auth_id,date:r.date,time:r.time,visitType:r.visit_type,attendance:r.attendance,cptCodes:r.cpt_codes||[],coPayCollected:r.co_pay_collected,notes:r.notes||’’})},
{n:‘pocs’,k:‘chpt_pocs’,m:r=>({id:r.id,patientId:r.patient_id,evalDate:r.eval_date,certEnd:r.cert_end,dischargeGoal:r.discharge_goal,status:r.status,notes:r.notes||’’})},
{n:‘reminders’,k:‘chpt_reminders’,m:r=>({id:r.id,category:r.category,text:r.text,dueDate:r.due_date,done:r.done})},
{n:‘follow_ups’,k:‘chpt_followups’,m:r=>({id:r.id,patientId:r.patient_id,reason:r.reason,date:r.date,resolved:r.resolved,notes:r.notes||’’})},
{n:‘insur_verifs’,k:‘chpt_insurverifs’,m:r=>({id:r.id,patientId:r.patient_id,checklist:r.checklist||{},deductible:r.deductible,copay:r.copay,oop:r.oop,oopRemaining:r.oop_remaining,visitsAllowed:r.visits_allowed,notes:r.notes||’’,date:r.date})},
{n:‘closed_days’,k:‘chpt_closeddays’,m:r=>r.day},
];
for(const t of tables) {
try {
const {data}=await db.from(t.n).select(’*’).order(‘created_at’,{ascending:true});
if(data&&data.length>0) localStorage.setItem(t.k,JSON.stringify(data.map(t.m)));
} catch(err) { console.warn(‘Load error:’,t.n,err); }
}
}

// ── APPOINTMENTS TAB ──
function AppointmentsTab({patients,auths,setAuths,appointments,setAppointments}) {
const [closedDays,setClosedDays]=useLS(‘chpt_closeddays’,[]);
const toggleClosed=day=>setClosedDays(d=>d.includes(day)?d.filter(x=>x!==day):[…d,day]);
const empty={id:’’,patientId:’’,authId:’’,date:’’,time:’’,visitType:‘Follow-Up’,attendance:‘Scheduled’,cptCodes:[{code:‘97110’,units:1}],coPayCollected:false,notes:’’};
const [form,setForm]=useState({…empty});
const [editing,setEditing]=useState(null);
const [show,setShow]=useState(false);
const [confirmDel,setConfirmDel]=useState(null);
const [viewMode,setViewMode]=useState(‘week’);
const [filterDate,setFilterDate]=useState(’’);
const [selPt,setSelPt]=useState(’’);
const [showExport,setShowExport]=useState(false);
const [exportRows,setExportRows]=useState([]);
const [exportTitle,setExportTitle]=useState(’’);
const [csvCopied,setCsvCopied]=useState(false);
const [weekStart,setWeekStart]=useState(()=>{
const d=new Date();d.setDate(d.getDate()-d.getDay()+1);return d.toISOString().slice(0,10);
});
const weekDays=Array.from({length:6},(_,i)=>addDays(weekStart,i));
const DAY_NAMES=[‘Mon’,‘Tue’,‘Wed’,‘Thu’,‘Fri’,‘Sat’];
const fmtShort=d=>new Date(d+‘T12:00:00’).toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’});
const attColor=s=>s===‘Attended’?T.green:s===‘No-Show’?T.red:s===‘Cancelled’?T.orange:s===‘Closed’?T.textDim:T.blue;
const getPt=id=>patients.find(p=>p.id===id);
const getAuth=id=>auths.find(a=>a.id===id);

const markAttended=appt=>{
if(appt.attendance===‘Attended’) return;
setAppointments(a=>a.map(x=>x.id===appt.id?{…x,attendance:‘Attended’}:x));
if(appt.authId) setAuths(a=>a.map(x=>x.id===appt.authId?{…x,visitsUsed:(Number(x.visitsUsed)||0)+1}:x));
};

const del=id=>{
if(confirmDel===id){setAppointments(a=>a.filter(x=>x.id!==id));setConfirmDel(null);}
else{setConfirmDel(id);setTimeout(()=>setConfirmDel(null),3000);}
};

const save=()=>{
if(!form.patientId||!form.date) return alert(‘Patient and date required.’);
const prev=editing?appointments.find(x=>x.id===editing):null;
const wasAttended=prev?.attendance===‘Attended’;
const isNow=form.attendance===‘Attended’;
if(editing){
setAppointments(a=>a.map(x=>x.id===editing?{…form,id:editing}:x));
if(!wasAttended&&isNow&&form.authId) setAuths(a=>a.map(x=>x.id===form.authId?{…x,visitsUsed:(Number(x.visitsUsed)||0)+1}:x));
else if(wasAttended&&!isNow&&form.authId) setAuths(a=>a.map(x=>x.id===form.authId?{…x,visitsUsed:Math.max(0,(Number(x.visitsUsed)||0)-1)}:x));
} else {
setAppointments(a=>[…a,{…form,id:uid()}]);
if(isNow&&form.authId) setAuths(a=>a.map(x=>x.id===form.authId?{…x,visitsUsed:(Number(x.visitsUsed)||0)+1}:x));
}
setForm({…empty});setEditing(null);setShow(false);
};

const filtered=appointments.filter(a=>(!filterDate||a.date===filterDate)&&(!selPt||a.patientId===selPt)).sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));

const copyCSV=rows=>{
const headers=[‘Date’,‘Time’,‘Patient’,‘Chart #’,‘Case Type’,‘Visit Type’,‘Attendance’,‘Auth #’,‘CPT Codes’,‘Units’];
const data=rows.map(a=>{
const pt=getPt(a.patientId);const auth=getAuth(a.authId);
return [a.date,a.time,pt?.initials||’’,pt?.chartNum||’’,pt?.caseType||’’,a.visitType,a.attendance,auth?.authNum||’’,(a.cptCodes||[]).map(c=>c.code+‘×’+c.units).join(’ | ‘),(a.cptCodes||[]).reduce((s,c)=>s+c.units,0)];
});
const csv=[headers,…data].map(r=>r.map(v=>’”’+String(v).replace(/”/g,’””’)+’”’).join(’,’)).join(’\n’);
navigator.clipboard.writeText(csv).then(()=>{setCsvCopied(true);setTimeout(()=>setCsvCopied(false),2500);});
};

const exportWeek=()=>{
const wa=appointments.filter(a=>weekDays.includes(a.date)).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
setExportRows(wa);
setExportTitle(’Week of ‘+fmtShort(weekStart)+’ – ’+fmtShort(addDays(weekStart,5)));
copyCSV(wa);setShowExport(true);
};

const exportList=()=>{
setExportRows(filtered);
setExportTitle(filterDate?fmt(filterDate):‘All Dates’);
copyCSV(filtered);setShowExport(true);
};

return e(‘div’,null,
e(‘div’,{style:{display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,marginBottom:12}},
e(‘span’,{style:{fontSize:18,fontWeight:700}},‘Appointments’),
e(‘div’,{style:{display:‘flex’,gap:8}},
btn(‘📋 Biller Export’,exportList,‘ghost’),
btn(’+ Add Appt’,()=>{setForm({…empty});setEditing(null);setShow(true)})
)
),
// View toggle
e(‘div’,{style:{display:‘flex’,gap:6,marginBottom:12}},
[‘week’,‘list’].map(m=>e(‘div’,{key:m,onClick:()=>setViewMode(m),style:{padding:‘5px 14px’,borderRadius:20,fontSize:12,cursor:‘pointer’,fontWeight:600,background:viewMode===m?T.blue+‘33’:T.bgHover,border:‘1px solid ‘+(viewMode===m?T.blue:T.border),color:viewMode===m?T.blue:T.textMuted}},m===‘week’?‘📅 Week View’:‘📋 List View’))
),
// Week view
viewMode===‘week’&&e(‘div’,null,
e(‘div’,{style:{display:‘flex’,alignItems:‘center’,gap:10,marginBottom:12,flexWrap:‘wrap’}},
btn(’‹ Prev’,()=>setWeekStart(w=>addDays(w,-7)),‘ghost’,{padding:‘5px 10px’}),
btn(‘Today’,()=>{const d=new Date();d.setDate(d.getDate()-d.getDay()+1);setWeekStart(d.toISOString().slice(0,10));},‘ghost’,{padding:‘5px 10px’,fontSize:11}),
btn(‘Next ›’,()=>setWeekStart(w=>addDays(w,7)),‘ghost’,{padding:‘5px 10px’}),
e(‘span’,{style:{fontSize:13,fontWeight:600,color:T.text}},fmtShort(weekStart)+’ – ‘+fmtShort(addDays(weekStart,5))),
btn(‘📋 Export Week’,exportWeek,‘ghost’,{marginLeft:‘auto’,fontSize:12})
),
e(‘div’,{style:{display:‘grid’,gridTemplateColumns:‘repeat(6,1fr)’,gap:8}},
weekDays.map((day,i)=>{
const isToday=day===today();
const isClosed=closedDays.includes(day);
const dayAppts=appointments.filter(a=>a.date===day).sort((a,b)=>(a.time||’’).localeCompare(b.time||’’));
return e(‘div’,{key:day,style:{background:isClosed?T.textDim+‘18’:isToday?T.blue+‘18’:T.bgCard,border:‘1px solid ‘+(isClosed?T.textDim:isToday?T.blue:T.border),borderRadius:8,overflow:‘hidden’,minHeight:120,opacity:isClosed?.75:1}},
e(‘div’,{style:{padding:‘7px 8px’,borderBottom:‘1px solid ‘+(isClosed?T.textDim:isToday?T.blue:T.border),background:isClosed?T.textDim+‘22’:isToday?T.blue+‘30’:T.bg,textAlign:‘center’}},
e(‘div’,{style:{fontSize:11,fontWeight:700,color:isClosed?T.textDim:isToday?T.blue:T.textMuted}},DAY_NAMES[i]),
e(‘div’,{style:{fontSize:13,fontWeight:700,color:isClosed?T.textDim:isToday?T.blue:T.text}},fmtShort(day)),
e(‘div’,{onClick:()=>toggleClosed(day),style:{marginTop:4,fontSize:10,cursor:‘pointer’,fontWeight:700,color:isClosed?T.red:T.textDim,background:isClosed?T.red+‘22’:T.textDim+‘22’,borderRadius:3,padding:‘2px 5px’,display:‘inline-block’}},isClosed?‘🔒 CLOSED’:‘Mark Closed’)
),
e(‘div’,{style:{padding:4}},
isClosed&&e(‘div’,{style:{fontSize:11,color:T.textDim,textAlign:‘center’,padding:‘10px 4px’,fontWeight:600}},‘Office Closed’),
!isClosed&&dayAppts.map(a=>{
const pt=getPt(a.patientId);
return e(‘div’,{key:a.id,style:{background:T.bgHover,borderRadius:5,padding:‘5px 7px’,marginBottom:4,borderLeft:‘3px solid ‘+attColor(a.attendance),cursor:‘pointer’},onClick:()=>{setForm({…a});setEditing(a.id);setShow(true);}},
e(‘div’,{style:{fontWeight:700,fontSize:12,color:T.text,whiteSpace:‘nowrap’,overflow:‘hidden’,textOverflow:‘ellipsis’}},
a.time&&e(‘span’,{style:{color:T.textMuted,marginRight:4,fontSize:11}},a.time),
pt?pt.initials:’—’
),
e(‘div’,{style:{fontSize:10,color:T.textMuted,marginTop:1}},a.visitType),
e(‘div’,{style:{display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,marginTop:3}},
e(‘span’,{style:{fontSize:10,color:attColor(a.attendance),fontWeight:600}},a.attendance),
e(‘div’,{style:{display:‘flex’,gap:4}},
a.attendance!==‘Attended’&&e(‘span’,{onClick:ev=>{ev.stopPropagation();markAttended(a);},style:{fontSize:10,color:T.green,cursor:‘pointer’,fontWeight:700,background:T.green+‘22’,borderRadius:3,padding:‘1px 4px’}},‘✓’),
e(‘span’,{onClick:ev=>{ev.stopPropagation();del(a.id);},style:{fontSize:10,cursor:‘pointer’,fontWeight:700,background:confirmDel===a.id?T.red+‘44’:T.red+‘22’,color:T.red,borderRadius:3,padding:‘1px 4px’}},confirmDel===a.id?‘Sure?’:‘✕’)
)
)
);
}),
!isClosed&&dayAppts.length===0&&e(‘div’,{style:{fontSize:11,color:T.textDim,textAlign:‘center’,padding:‘12px 4px’}},’—’)
)
);
})
),
e(‘div’,{style:{marginTop:8,fontSize:11,color:T.textDim}},‘Tap any appointment to edit it.’)
),
// List view
viewMode===‘list’&&e(‘div’,null,
e(‘div’,{style:{display:‘flex’,gap:8,marginBottom:14,flexWrap:‘wrap’}},

e(‘select’,{value:selPt,onChange:ev=>setSelPt(ev.target.value),style:{width:200}},
[e(‘option’,{key:’’,value:’’},‘All Patients’),…patients.map(p=>e(‘option’,{key:p.id,value:p.id},p.initials+’ #’+p.chartNum))]
),
(filterDate||selPt)&&btn(‘Clear’,()=>{setFilterDate(’’);setSelPt(’’);},‘ghost’),
btn(‘📋 Biller Export’,exportList,‘ghost’,{marginLeft:‘auto’})
),
filtered.map(a=>{
const pt=getPt(a.patientId);const auth=getAuth(a.authId);
return card([
e(‘div’,{style:{display:‘flex’,justifyContent:‘space-between’,alignItems:‘flex-start’},key:‘h’},
e(‘div’,null,
e(‘span’,{style:{fontWeight:700}},pt?pt.initials+’ #’+pt.chartNum:’—’),
e(‘span’,{style:{marginLeft:8,fontSize:12,color:T.textMuted}},a.date+’ ‘+a.time),
e(‘span’,{style:{marginLeft:8}},badge(a.visitType)),

),

)
),
e(‘div’,{style:{marginTop:6,display:‘flex’,flexWrap:‘wrap’,gap:‘4px 16px’,fontSize:12,color:T.textMuted},key:‘d’},
auth&&e(‘span’,null,‘Auth: ‘,e(‘b’,{style:{color:T.text}},auth.authNum),’ (’,auth.insurance,’)’),
(a.cptCodes||[]).length>0&&e(‘span’,null,‘CPT: ‘,e(‘b’,{style:{color:T.text}},(a.cptCodes).map(c=>c.code+‘×’+c.units).join(’, ‘))),

),

],{key:a.id});
}),
filtered.length===0&&e(‘div’,{style:{color:T.textMuted,textAlign:‘center’,padding:40}},‘No appointments found.’)
),

modal(showExport,()=>setShowExport(false),‘📋 Biller Export’,
e(‘div’,null,
e(‘div’,{style:{marginBottom:16,display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,flexWrap:‘wrap’,gap:8}},
e(‘span’,{style:{fontSize:13,color:T.textMuted}},e(‘b’,{style:{color:T.text}},exportTitle),’ · ‘+exportRows.length+’ appointments’),

),

[‘Date’,‘Chart #’,‘Patient’,‘Case’,‘Visit Type’,‘Attendance’].map(h=>e(‘div’,{key:h,style:{fontSize:11,fontWeight:700,color:T.textMuted,padding:‘0 8px’}},h))
),

const authData=auths.map(a=>{
const pt=patients.find(p=>p.id===a.patientId);
const approved=Number(a.visitsApproved)||0;
const used=Number(a.visitsUsed)||0;
const pct=approved>0?Math.round((used/approved)*100):0;
const weeks=a.startDate?Math.max(1,daysBetween(a.startDate,today())/7):1;
return {a,pt,approved,used,pct,rate:(used/weeks).toFixed(1)};
});
return e(‘div’,null,
e(‘div’,{style:{fontSize:18,fontWeight:700,marginBottom:16}},‘Reports’),
e(‘div’,{style:{display:‘flex’,gap:8,alignItems:‘center’,marginBottom:20}},
e(‘label’,{style:{margin:0}},‘Month:’),
e(‘input’,{type:‘month’,value:month,onChange:ev=>setMonth(ev.target.value),style:{width:160}})
),
e(‘div’,{style:{fontSize:11,fontWeight:700,letterSpacing:‘0.08em’,color:T.textDim,textTransform:‘uppercase’,marginBottom:12}},‘Auth Utilization’),
card(
e(‘table’,{style:{width:‘100%’,borderCollapse:‘collapse’,fontSize:13}},
e(‘thead’,null,e(‘tr’,{style:{borderBottom:‘1px solid ‘+T.border,color:T.textMuted,fontSize:11,textAlign:‘left’}},
[‘Patient’,‘Auth #’,‘Insurance’,‘Used/Approved’,’% Used’,‘Visits/Wk’,‘Expires’].map(h=>e(‘th’,{key:h,style:{padding:‘6px 8px’}},h))
)),
e(‘tbody’,null,authData.map(({a,pt,approved,used,pct,rate})=>
e(‘tr’,{key:a.id,style:{borderBottom:‘1px solid ‘+T.border}},
e(‘td’,{style:{padding:‘6px 8px’,fontWeight:600}},pt?pt.initials+’ #’+pt.chartNum:’—’),
e(‘td’,{style:{padding:‘6px 8px’}},a.authNum),
e(‘td’,{style:{padding:‘6px 8px’,color:T.textMuted}},a.insurance),
e(‘td’,{style:{padding:‘6px 8px’}},used+’/’+approved),
e(‘td’,{style:{padding:‘6px 8px’}},e(‘span’,{style:{color:pct>=90?T.red:pct>=70?T.yellow:T.green,fontWeight:600}},pct+’%’)),
e(‘td’,{style:{padding:‘6px 8px’,color:T.textMuted}},rate),
e(‘td’,{style:{padding:‘6px 8px’,fontSize:11,color:T.textMuted}},fmt(a.endDate))
)
)),
authData.length===0&&e(‘tbody’,null,e(‘tr’,null,e(‘td’,{colSpan:7,style:{padding:20,textAlign:‘center’,color:T.textMuted}},‘No authorizations yet.’)))
)
)
);
}

// ── MONTHLY SUMMARY ──
function SummaryTab({patients,appointments}) {
const [month,setMonth]=useState(today().slice(0,7));
const monthAppts=appointments.filter(a=>a.date.startsWith(month));
const data=patients.map(p=>{
const pa=monthAppts.filter(a=>a.patientId===p.id);
return {p,total:pa.length,attended:pa.filter(a=>a.attendance===‘Attended’).length,cancelled:pa.filter(a=>a.attendance===‘Cancelled’).length,noShow:pa.filter(a=>a.attendance===‘No-Show’).length,units:pa.filter(a=>a.attendance===‘Attended’).reduce((s,a)=>(a.cptCodes||[]).reduce((su,c)=>su+c.units,s),0)};
}).filter(r=>r.total>0);
return e(‘div’,null,
e(‘div’,{style:{fontSize:18,fontWeight:700,marginBottom:16}},‘Monthly Summary’),
e(‘div’,{style:{display:‘flex’,gap:8,alignItems:‘center’,marginBottom:20}},
e(‘label’,{style:{margin:0}},‘Month:’),
e(‘input’,{type:‘month’,value:month,onChange:ev=>setMonth(ev.target.value),style:{width:160}})
),
e(‘div’,{style:{display:‘grid’,gridTemplateColumns:‘repeat(4,1fr)’,gap:12,marginBottom:20}},
[{label:‘Total’,val:monthAppts.length,color:T.blue},{label:‘Attended’,val:monthAppts.filter(a=>a.attendance===‘Attended’).length,color:T.green},{label:‘Cancelled’,val:monthAppts.filter(a=>a.attendance===‘Cancelled’).length,color:T.orange},{label:‘No-Shows’,val:monthAppts.filter(a=>a.attendance===‘No-Show’).length,color:T.red}]
.map(s=>e(‘div’,{key:s.label,style:{background:T.bgCard,border:’1px solid ’+T.border,borderRadius:10,padding:‘16px 20px’,display:‘flex’,flexDirection:‘column’,gap:4}},
e(‘span’,{style:{fontSize:28,fontWeight:700,color:s.color}},s.val),
e(‘span’,{style:{fontSize:12,color:T.textMuted}},s.label)
))
),
card(e(‘table’,{style:{width:‘100%’,borderCollapse:‘collapse’,fontSize:13}},
e(‘thead’,null,e(‘tr’,{style:{borderBottom:’1px solid ’+T.border,color:T.textMuted,fontSize:11,textAlign:‘left’}},
[‘Patient’,‘Total’,‘Attended’,‘Cancelled’,‘No-Show’,‘Units’].map(h=>e(‘th’,{key:h,style:{padding:‘6px 8px’}},h))
)),
e(‘tbody’,null,data.map(({p,total,attended,cancelled,noShow,units})=>
e(‘tr’,{key:p.id,style:{borderBottom:‘1px solid ‘+T.border}},
e(‘td’,{style:{padding:‘6px 8px’,fontWeight:600}},p.initials+’ #’+p.chartNum),
e(‘td’,{style:{padding:‘6px 8px’}},total),
e(‘td’,{style:{padding:‘6px 8px’,color:T.green}},attended),
e(‘td’,{style:{padding:‘6px 8px’,color:T.orange}},cancelled),
e(‘td’,{style:{padding:‘6px 8px’,color:T.red}},noShow),
e(‘td’,{style:{padding:‘6px 8px’,fontWeight:600,color:T.blue}},units)
)
)),
data.length===0&&e(‘tbody’,null,e(‘tr’,null,e(‘td’,{colSpan:6,style:{padding:20,textAlign:‘center’,color:T.textMuted}},‘No appointments this month.’)))
))
);
}

// ── DASHBOARD ──
function DashboardTab({patients,auths,appointments,pocs,followUps}) {
const todayStr=today();
const todayAppts=appointments.filter(a=>a.date===todayStr);
const attended=todayAppts.filter(a=>a.attendance===‘Attended’);
const totalUnits=attended.reduce((s,a)=>(a.cptCodes||[]).reduce((su,c)=>su+c.units,s),0);
const expiringAuths=auths.filter(a=>a.endDate&&daysBetween(todayStr,a.endDate)>=0&&daysBetween(todayStr,a.endDate)<=7);
const lowVisits=auths.filter(a=>(Number(a.visitsApproved)||0)-(Number(a.visitsUsed)||0)<=2);
const openFollowUps=followUps.filter(f=>!f.resolved);
const getPt=id=>patients.find(p=>p.id===id);
const statCard=(label,val,color)=>e(‘div’,{style:{background:T.bgCard,border:‘1px solid ‘+T.border,borderRadius:10,padding:‘16px 20px’,display:‘flex’,flexDirection:‘column’,gap:4}},
e(‘span’,{style:{fontSize:32,fontWeight:700,color}},val),
e(‘span’,{style:{fontSize:12,fontWeight:600,color:T.text}},label)
);
return e(‘div’,null,
e(‘div’,{style:{fontSize:18,fontWeight:700,marginBottom:4}},‘Dashboard’),
e(‘div’,{style:{fontSize:12,color:T.textMuted,marginBottom:20}},new Date().toLocaleDateString(‘en-US’,{weekday:‘long’,year:‘numeric’,month:‘long’,day:‘numeric’})),
e(‘div’,{style:{display:‘grid’,gridTemplateColumns:‘repeat(auto-fill,minmax(160px,1fr))’,gap:12,marginBottom:24}},
statCard(‘Patients’,patients.length,T.blue),
statCard(‘Active Auths’,auths.length,T.green),
statCard(“Today’s Appts”,todayAppts.length,T.blue),
statCard(‘Units Today’,totalUnits,T.blue),
statCard(‘Open Follow-Ups’,openFollowUps.length,openFollowUps.length>0?T.orange:T.green),
statCard(‘Low Visit Auths’,lowVisits.length,lowVisits.length>0?T.red:T.green),
statCard(‘Expiring Auths’,expiringAuths.length,expiringAuths.length>0?T.yellow:T.green)
),
e(‘div’,{style:{display:‘grid’,gridTemplateColumns:‘1fr 1fr’,gap:16}},
e(‘div’,null,
e(‘div’,{style:{fontSize:11,fontWeight:700,letterSpacing:‘0.08em’,color:T.textDim,textTransform:‘uppercase’,marginBottom:12}},‘🚨 Alerts’),
expiringAuths.map(a=>alert(‘⏰ Auth ‘+a.authNum+’ (’+getPt(a.patientId)?.initials+’) expires ‘+fmt(a.endDate),T.yellow)),
lowVisits.map(a=>alert(‘⚠ ‘+getPt(a.patientId)?.initials+’ — ‘+((Number(a.visitsApproved)||0)-(Number(a.visitsUsed)||0))+’ visit(s) remaining’,T.red)),
openFollowUps.slice(0,3).map(f=>alert(‘📞 Follow-up: ‘+getPt(f.patientId)?.initials+’ (’+f.reason+’)’,T.orange)),
expiringAuths.length===0&&lowVisits.length===0&&openFollowUps.length===0&&e(‘div’,{style:{color:T.green,fontSize:13,padding:‘12px 0’}},‘✅ No alerts! You're all caught up.’)
),
e(‘div’,null,
e(‘div’,{style:{fontSize:11,fontWeight:700,letterSpacing:‘0.08em’,color:T.textDim,textTransform:‘uppercase’,marginBottom:12}},‘📊 End-of-Day Summary’),
card(e(‘div’,null,
[[‘Scheduled’,todayAppts.length,T.text],[‘Attended’,attended.length,T.green],[‘No-Shows’,todayAppts.filter(a=>a.attendance===‘No-Show’).length,T.red],[‘Cancellations’,todayAppts.filter(a=>a.attendance===‘Cancelled’).length,T.orange],[‘Units Billed’,totalUnits,T.blue],[‘Co-pays Collected’,attended.filter(a=>a.coPayCollected).length+’ / ’+attended.length,T.green]]
.map(([label,val,color])=>e(‘div’,{key:label,style:{display:‘flex’,justifyContent:‘space-between’,fontSize:13,padding:‘6px 0’,borderBottom:’1px solid ’+T.border}},
e(‘span’,{style:{color:T.textMuted}},label),
e(‘b’,{style:{color}},val)
))
))
)
)
);
}

// ── MAIN APP ──
function App() {
const [loggedIn,setLoggedIn]=useState(()=>sessionStorage.getItem(‘chpt_auth’)===‘1’);
const [loading,setLoading]=useState(false);
const [tab,setTab]=useState(‘dashboard’);
const [patients,setPatients]=useLS(‘chpt_patients’,[]);
const [auths,setAuths]=useLS(‘chpt_auths’,[]);
const [appointments,setAppointments]=useLS(‘chpt_appointments’,[]);
const [reminders,setReminders]=useLS(‘chpt_reminders’,[]);
const [followUps,setFollowUps]=useLS(‘chpt_followups’,[]);
const [pocs,setPocs]=useLS(‘chpt_pocs’,[]);
const [insurVerifs,setInsurVerifs]=useLS(‘chpt_insurverifs’,[]);

const handleLogin=async()=>{
setLoading(true);
await loadFromSupabase();
// Re-read from localStorage after sync
setLoading(false);
setLoggedIn(true);
// Force re-render by reloading page data
window.location.reload();
};

const alertCount=useMemo(()=>{
const exp=auths.filter(a=>a.endDate&&daysBetween(today(),a.endDate)>=0&&daysBetween(today(),a.endDate)<=7).length;
const low=auths.filter(a=>(Number(a.visitsApproved)||0)-(Number(a.visitsUsed)||0)<=2).length;
const open=followUps.filter(f=>!f.resolved).length;
return exp+low+open;
},[auths,followUps]);

if(!loggedIn) return e(LoginScreen,{onLogin:handleLogin});
if(loading) return e(LoadingScreen,null);

const sidebarStyle={width:220,background:T.bgCard,borderRight:’1px solid ’+T.border,display:‘flex’,flexDirection:‘column’,flexShrink:0,overflowY:‘auto’};

return e(‘div’,{style:{background:T.bg,minHeight:‘100vh’,color:T.text,fontFamily:”‘DM Sans’,sans-serif”}},
e(‘div’,{style:{display:‘flex’,height:‘100vh’,overflow:‘hidden’}},
e(‘div’,{style:sidebarStyle},
e(‘div’,{style:{padding:‘18px 16px 12px’,borderBottom:’1px solid ’+T.border,fontSize:13,fontWeight:700,color:T.blue,letterSpacing:‘0.02em’,lineHeight:1.3}},
‘CHPT’,e(‘br’),e(‘span’,{style:{fontSize:10,fontWeight:400,color:T.textMuted,letterSpacing:‘0.04em’}},‘WORKFLOW / TRACKER’)
),
e(‘nav’,{style:{padding:‘8px 0’,flex:1}},
TABS.map(t=>e(‘div’,{key:t.id,onClick:()=>setTab(t.id),style:{display:‘flex’,alignItems:‘center’,gap:8,padding:‘9px 16px’,cursor:‘pointer’,fontSize:13,fontWeight:500,color:tab===t.id?T.blue:T.textMuted,background:tab===t.id?T.blue+‘18’:‘transparent’,borderLeft:‘3px solid ‘+(tab===t.id?T.blue:‘transparent’)}},
e(‘span’,null,t.icon),
e(‘span’,null,t.label),
t.id===‘dashboard’&&alertCount>0&&e(‘span’,{style:{marginLeft:‘auto’,background:T.red,color:’#fff’,borderRadius:99,fontSize:10,fontWeight:700,padding:‘1px 6px’}},alertCount)
))
),
e(‘div’,{style:{padding:‘12px 16px’,borderTop:’1px solid ’+T.border,fontSize:10,color:T.textDim,lineHeight:1.6}},
‘v2.0 · Cloud Sync’,e(‘br’),
e(‘span’,{onClick:()=>{sessionStorage.removeItem(‘chpt_auth’);window.location.reload();},style:{color:T.red,cursor:‘pointer’,fontSize:11}},‘Sign Out’)
)
),
e(‘div’,{style:{flex:1,display:‘flex’,flexDirection:‘column’,overflow:‘hidden’}},
e(‘div’,{style:{padding:‘14px 24px’,borderBottom:‘1px solid ‘+T.border,background:T.bgCard,display:‘flex’,alignItems:‘center’,justifyContent:‘space-between’}},
e(‘span’,{style:{fontSize:15,fontWeight:700}},TABS.find(t=>t.id===tab)?.icon+’ ‘+TABS.find(t=>t.id===tab)?.label),
e(‘div’,{style:{fontSize:12,color:T.textMuted}},patients.length+’ patients · ‘+auths.length+’ auths · ‘+appointments.filter(a=>a.date===today()).length+’ appts today’)
),
e(‘div’,{style:{flex:1,overflowY:‘auto’,padding:‘20px 24px’}},
tab===‘dashboard’&&e(DashboardTab,{patients,auths,appointments,pocs,followUps}),
tab===‘patients’&&e(PatientsTab,{patients,setPatients}),
tab===‘auths’&&e(AuthsTab,{patients,auths,setAuths}),
tab===‘appointments’&&e(AppointmentsTab,{patients,auths,setAuths,appointments,setAppointments}),
tab===‘soap’&&e(SOAPTab,{patients}),
tab===‘reminders’&&e(RemindersTab,{reminders,setReminders}),
tab===‘followup’&&e(FollowUpTab,{patients,followUps,setFollowUps}),
tab===‘poc’&&e(PlanOfCareTab,{patients,pocs,setPocs}),
tab===‘insur’&&e(InsuranceVerifTab,{patients,insurVerifs,setInsurVerifs}),
tab===‘reports’&&e(ReportsTab,{patients,auths,appointments}),
tab===‘summary’&&e(SummaryTab,{patients,appointments})
)
)
)
);
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(e(App,null));
</script>

</body>
