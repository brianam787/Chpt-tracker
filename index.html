function useLS(key, init) {
const [val, setVal] = useState(() => {
try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
catch { return init; }
});
const set = useCallback(v => {

});

function DashboardTab({patients, auths, appointments, pocs, followUps, reminders}) {
const todayStr = today();
const todayAppts = appointments.filter(a=>a.date===todayStr);

// Expiring auths (within 7 days)
const expiringAuths = auths.filter(a => {
if (!a.endDate) return false;
const d = daysBetween(todayStr, a.endDate);
return d >= 0 && d <= 7;
});

// Low visits (≤2 remaining)
const lowVisits = auths.filter(a => (Number(a.visitsApproved)||0)-(Number(a.visitsUsed)||0) <= 2);

// Re-cert due (within 14 days)
const recertDue = pocs.filter(p => {
if (!p.certEnd || p.status===“Discharged”) return false;
const rd = addDays(p.certEnd,-7);
const d = daysBetween(todayStr, rd);
return d >= 0 && d <= 14;
});

// Open follow-ups
const openFollowUps = followUps.filter(f=>!f.resolved);

// Patients with no appointments in last 14 days

const recent = appointments.filter(a => a.patientId===p.id && a.date >= addDays(todayStr,-14));
return recent.length === 0;
});

// Today’s summary

const totalUnits = attended.reduce((s,a)=>(a.cptCodes||[]).reduce((su,c)=>su+c.units,s),0);
const coPayCollected = attended.filter(a=>a.coPayCollected).length;

// Supabase sync hooks — replace useLS with these
function useSBTable(table, mapFn, deps=[]) {
const [data, setData] = React.useState([]);
const [loaded, setLoaded] = React.useState(false);

const load = React.useCallback(async () => {
const { data: rows } = await db.from(table).select(”*”).order(“created_at”, {ascending:true});
setData((rows||[]).map(mapFn));
setLoaded(true);
}, [table]);

React.useEffect(() => { load(); }, [load, …deps]);

return [data, setData, load, loaded];
}

// Intercept all saves to also write to Supabase
function AppWithSave({onLogout}) {
// We patch the useLS hook behavior by watching localStorage changes
// and syncing to Supabase
React.useEffect(() => {
const origSetItem = localStorage.setItem.bind(localStorage);
localStorage.setItem = function(key, value) {
origSetItem(key, value);
syncToSupabase(key, value);
};
return () => { localStorage.setItem = origSetItem; };
}, []);

return (
<div style={{position:“relative”}}>
<button onClick={onLogout} style={{position:“fixed”,bottom:12,left:12,zIndex:999,background:”#1a2d44”,color:”#7a9ab8”,border:“none”,borderRadius:6,padding:“5px 10px”,fontSize:11,cursor:“pointer”}}>

const tableMap = {

“chpt_appointments”: {table:“appointments”, toRow: a=>({id:a.id,patient_id:a.patientId,auth_id:a.authId||null,date:a.date,time:a.time,visit_type:a.visitType,attendance:a.attendance,cpt_codes:a.cptCodes||[],co_pay_collected:a.coPayCollected,notes:a.notes||””})},
